<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="AI 3D concept image">
  <defs>
    <linearGradient id="bgSky" x1="0.08" y1="0.05" x2="0.95" y2="0.98">
      <stop offset="0%" stop-color="#0a1730" />
