<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Futuristic AI network scene">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f89d7"/>
      <stop offset="45%" stop-color="#6b62c8"/>
      <stop offset="100%" stop-color="#3c8fb2"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="0.22" cy="0.2" r="0.55">
      <stop offset="0%" stop-color="#9af2ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9af2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCoral" cx="0.8" cy="0.72" r="0.5">
      <stop offset="0%" stop-color="#ffb28f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffb28f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d3f4ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffe0d0" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="hardGlow">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgA)"/>
  <rect width="1920" height="1080" fill="url(#glowCyan)"/>
  <rect width="1920" height="1080" fill="url(#glowCoral)"/>

