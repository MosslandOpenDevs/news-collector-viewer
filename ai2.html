          .replace(/\s+/g, " ")
          .replace(/\[\s*(?:\.\.\.|…)\s*\]/g, " ")
          .replace(/\(\s*(?:\.\.\.|…)\s*\)/g, " ")
          .replace(/\s*(\.\.\.|…)+\s*$/g, "")
          .trim();
        if (!raw) return "";

        const boilerplatePatterns = [
          /무엇이\s*출시됐는지/i,
          /이전\s*버전.*바뀌었는지/i,
          /누가\s*먼저\s*접근할\s*수\s*있는지/i,
          /출시\s*범위/i,
          /실제\s*사용\s*사례/i,
          /팀에\s*미칠\s*영향/i,
          /이번\s*글(?:에서는|은)/i,
          /이\s*기사(?:에서는|는)/i,
        ];

        const captionLikePatterns = [
          /(?:왼쪽|오른쪽|배경|전경|사진에는|이미지에는|포즈|입은|착용|화면에는|표시되어 있습니다|보입니다|보여줍니다)/,
          /\b(?:photo|pictured|image|screenshot|render(?:ing)?|illustration|on the left|on the right|background)\b/i,
        ];

        const hasProductTone = (text) => {
          const s = String(text || "");
          const norm = normalizeCompareText(s);
          if (!norm) return false;
          const keywordHits = countKeywordHits(norm, PRODUCT_NEWS_KEYWORDS) + countKeywordHits(norm, TECH_DEPTH_KEYWORDS);
          if (keywordHits >= 1) return true;
          return /(?:출시|공개|발표|업데이트|기능|모델|버전|api|sdk|앱|서비스|칩|gpu|도입|추가|개선|강화|연동|통합|배포|성능)/i.test(s);
        };

        const titleHasProductTone = hasProductTone(titleHint);

        const tightenSentence = (text) => {
          let out = decodeHtmlEntitiesText(text || "")
            .replace(/\s+/g, " ")
            .replace(/^\s*(?:그리고|또한|또|한편|특히)\s+/g, "")
            .replace(/\s*(\.\.\.|…)+\s*$/g, "")
            .trim();
          if (!out) return "";

          if (boilerplatePatterns.some((re) => re.test(out))) return "";
          if (captionLikePatterns.some((re) => re.test(out)) && !hasProductTone(out)) return "";
          if (!hasProductTone(out) && !titleHasProductTone && out.length < 24) return "";

          if (out.length > 260) {
            const clauses = out.split(/\s*(?:,\s+|;\s+| 그리고\s+| 또한\s+| 다만\s+)\s*/).filter(Boolean);
            if (clauses.length > 1) {
              let compact = clauses[0];
              for (let i = 1; i < clauses.length; i++) {
                const next = `${compact}, ${clauses[i]}`;
                if (next.length > 245) break;
                compact = next;
              }
              out = compact.trim();
            }
          }

          out = toConversationalKoreanSentence(out).replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
          return out;
        };

        const sentences = raw
          .split(/(?<=[.!?。！？])\s+/)
          .map((s) => tightenSentence(s))
          .filter((s) => s && s.length >= 16);
        if (!sentences.length) return "";

        const prioritized = sentences.filter((s) => hasProductTone(s));
        const ordered = [];
        const seen = new Set();
        const pushUnique = (arr) => {
          for (const s of arr || []) {
            const key = normalizeCompareText(s);
            if (!key || seen.has(key)) continue;
            seen.add(key);
            ordered.push(s);
          }
        };
        pushUnique(prioritized.length ? prioritized : titleHasProductTone ? sentences : []);
        pushUnique(sentences);
        if (!ordered.length) return "";

        const MIN_TARGET_CHARS = Math.max(220, Number(TARGET_CARD_SUMMARY_KO_CHARS) || 280);
        const MAX_SENTENCES = 6;
        const picked = [];
        for (const s of ordered) {
          if (picked.length >= MAX_SENTENCES) break;
          picked.push(s);
          const currentLen = normalizeCompareText(picked.join(" ")).length;
          if (picked.length >= 4 && currentLen >= MIN_TARGET_CHARS) break;
        }
        if (picked.length === 1) {
          const single = picked[0];
          const clauses = single.split(/\s*(?:,\s+|;\s+| 그리고\s+| 또한\s+| 다만\s+)\s*/).filter((c) => c && c.length >= 16);
          if (clauses.length >= 2) {
            const first = toConversationalKoreanSentence(clauses[0]);
            const second = toConversationalKoreanSentence(clauses.slice(1).join(", "));
            if (first && second) return `${first}\n${second}`;
          }
          return single;
        }
        if (picked.length === 2) return `${picked[0]}\n${picked[1]}`;
        if (picked.length === 3) return `${picked[0]} ${picked[1]}\n${picked[2]}`;
        const lead = `${picked[0]} ${picked[1]}`.trim();
        const tail = picked.slice(2).join(" ").trim();
        return tail ? `${lead}\n\n${tail}` : lead;
      }

      async function localizeItemsToKorean(items) {
        if (!Array.isArray(items) || !items.length) return;

        const queue = items.slice();
        let cursor = 0;
        const workerCount = Math.max(1, Math.min(KO_TRANSLATE_CONCURRENCY, queue.length));
        const hasHangul = (value) => /[가-힣]/.test(decodeHtmlEntitiesText(value || ""));
        const pickKoreanOrEmpty = (value) => {
          const normalized = decodeHtmlEntitiesText(value || "").trim();
          return normalized && hasHangul(normalized) ? normalized : "";
        };

        async function worker() {
          while (cursor < queue.length) {
            const idx = cursor++;
            const it = queue[idx];
            if (!it) continue;

            const canonical = ensureCanonicalCardText(it);
            const titleBase = canonical.titleEn;
            const summarySource = canonical.summaryEn;
            const hasSummary = summarySource && !isSummaryEmptyText(summarySource);
            const summaryEmergency = buildEmergencySummaryText(it.summaryText || "", titleBase);
            const summaryBase = hasSummary ? summarySource : summaryEmergency;

            const existingTitleKo = pickKoreanOrEmpty(it.cardTitleKo || it.titleKo || "");
            const existingSummaryKoRaw = pickKoreanOrEmpty(it.cardSummaryKo || it.summaryKo || "");
            const existingSummaryKo =
              normalizeCompareText(existingSummaryKoRaw).length >= 170 ? existingSummaryKoRaw : "";

            let titleKo = existingTitleKo || (await translateTextToKo(titleBase, "title"));
            let titleStyled = proofreadKoreanHeadlineText(stylizeKoreanHeadlineText(titleKo || titleBase));
            if (!hasHangul(titleStyled) && titleBase) {
              try {
                const forcedTitleKo = await translateTextViaPublicGoogle(titleBase, /[A-Za-z]/.test(titleBase) ? "en" : "auto", "ko");
                if (forcedTitleKo) {
                  titleKo = forcedTitleKo;
                  titleStyled = proofreadKoreanHeadlineText(stylizeKoreanHeadlineText(forcedTitleKo) || forcedTitleKo);
                }
              } catch (_e) {}
            }

            let summaryKo = existingSummaryKo || (summaryBase ? await translateTextToKo(summaryBase, "summary") : "");
            let summaryStyled = summaryBase
              ? proofreadKoreanSummaryText(stylizeKoreanSummaryText(summaryKo || summaryBase, titleStyled || titleKo || titleBase))
              : "";

            if (summaryBase && (!summaryStyled || !hasHangul(summaryStyled))) {
              try {
                const forcedSummaryKo = await translateTextViaPublicGoogle(
                  summaryBase,
                  /[A-Za-z]/.test(summaryBase) ? "en" : "auto",
                  "ko",
                );
                if (forcedSummaryKo) {
                  summaryKo = forcedSummaryKo;
                  const forcedStyled = stylizeKoreanSummaryText(forcedSummaryKo, titleStyled || titleKo || titleBase);
                  summaryStyled = proofreadKoreanSummaryText(forcedStyled || forcedSummaryKo);
                }
              } catch (_e) {}
            }

            it.cardTitleKo = titleStyled && hasHangul(titleStyled) ? titleStyled : proofreadKoreanHeadlineText(stylizeKoreanHeadlineText(titleBase));
            it.cardSummaryKo = summaryStyled && hasHangul(summaryStyled) ? summaryStyled : I18N.ko.summary_empty;
            // Backward-compat fields used by older code paths.
            it.titleKo = it.cardTitleKo;
            it.summaryKo = it.cardSummaryKo;
          }
        }

        const workers = [];
        for (let i = 0; i < workerCount; i++) workers.push(worker());
        await Promise.all(workers);
        saveKoTranslateCacheToStorage();
      }

      async function localizeItemsToEnglish(items) {
        if (!Array.isArray(items) || !items.length) return;
        const queue = items.filter((it) => {
          const canonical = ensureCanonicalCardText(it);
          const titleRaw = decodeHtmlEntitiesText(it?.title || canonical.titleEn || "");
          const summaryRaw = decodeHtmlEntitiesText(it?.summaryText || canonical.summaryEn || "");
          return /[가-힣]/.test(titleRaw) || /[가-힣]/.test(summaryRaw) || /[가-힣]/.test(canonical.titleEn || "") || /[가-힣]/.test(canonical.summaryEn || "");
        });
        if (!queue.length) return;

        let cursor = 0;
        const workerCount = Math.max(1, Math.min(KO_TRANSLATE_CONCURRENCY, queue.length));
        async function worker() {
          while (cursor < queue.length) {
            const idx = cursor++;
            const it = queue[idx];
            if (!it) continue;

            const canonical = ensureCanonicalCardText(it);
            const titleSource = decodeHtmlEntitiesText(it?.title || canonical.titleEn || "");
            const summarySource = decodeHtmlEntitiesText(it?.summaryText || canonical.summaryEn || "");
            const isAiTimesItem = String(it?.sourceFeed || "") === "aitimes_industry";

            let titleEn = canonical.titleEn || titleSource || "(No title)";
            if (/[가-힣]/.test(titleEn) || /[가-힣]/.test(titleSource)) {
              titleEn = (await translateTextToEn(titleSource || titleEn, "title")) || titleEn;
            }
            if (/[가-힣]/.test(titleEn) || !isReliableEnglishText(titleEn, 3)) {
              try {
                const forced = await translateTextViaPublicGoogle(titleSource || titleEn, /[가-힣]/.test(titleSource || titleEn) ? "ko" : "auto", "en");
                if (isReliableEnglishText(forced, 3)) titleEn = forced;
              } catch (e) {}
            }
            titleEn = proofreadEnglishHeadlineText(buildHeadlineText(titleEn, summarySource)) || proofreadEnglishHeadlineText(titleEn) || canonical.titleEn || titleSource || "(No title)";
            if (!titleEn || /[가-힣]/.test(titleEn) || !isReliableEnglishText(titleEn, 3)) {
              titleEn = buildEnglishFallbackTitleFromItem(it);
            }

            const summaryFallback = buildEmergencySummaryText(summarySource, titleSource || titleEn);
            const summarySeed =
              normalizeCompareText(summarySource).length >= 64
                ? summarySource
                : [summarySource, summaryFallback].filter(Boolean).join(" ").trim();
            const summaryBase = summarySeed || canonical.summaryEn || summaryFallback;
            let summaryEn = canonical.summaryEn || summaryBase || I18N.en.summary_empty;
            if (/[가-힣]/.test(summaryEn) || /[가-힣]/.test(summaryBase)) {
              summaryEn = (await translateTextToEn(summaryBase || summaryEn, "summary")) || summaryEn;
            }
            if ((/[가-힣]/.test(summaryEn) || !isReliableEnglishText(summaryEn, 18)) && summaryBase) {
              try {
                const forced = await translateTextViaPublicGoogle(summaryBase, /[가-힣]/.test(summaryBase) ? "ko" : "auto", "en");
                if (isReliableEnglishText(forced, 18)) summaryEn = forced;
              } catch (e) {}
            }
            summaryEn = proofreadEnglishSummaryText(summaryEn || summaryBase, titleEn) || summaryEn || I18N.en.summary_empty;
            if (!summaryEn || /[가-힣]/.test(summaryEn) || !isReliableEnglishText(summaryEn, 18)) {
              summaryEn = buildEnglishFallbackSummaryFromItem(it, titleEn);
            }
            if (summaryEn && !isSummaryEmptyText(summaryEn)) {
              summaryEn = ensureLongSummaryEn(it, summaryEn, summaryBase, titleEn, it?.categories || []);
            }
            if (!summaryEn || /[가-힣]/.test(summaryEn) || (isAiTimesItem && !isReliableEnglishText(summaryEn, 18))) {
              summaryEn = I18N.en.summary_empty;
            }

            it.cardTitleEn = titleEn;
            it.cardSummaryEn = summaryEn;
            it.titleEn = titleEn;
            it.summaryEn = summaryEn;
            const localizedCategories = getLocalizedCategories(it, "en");
            if (localizedCategories.length) it.categoriesEn = localizedCategories;
          }
        }

        const workers = [];
        for (let i = 0; i < workerCount; i++) workers.push(worker());
        await Promise.all(workers);
        saveEnTranslateCacheToStorage();
      }

      function getArticleSource(link) {
        if (!link) return t("footer_source");
        try {
          const host = new URL(link).hostname.replace(/^www\./i, "").trim();
          return host || t("footer_source");
        } catch (e) {
          return t("footer_source");
        }
      }

      function summaryQualityScore(item) {
        const titleText = decodeHtmlEntitiesText(item?.title || "");
        const summary = getNormalizedSummaryForItem(item);
        if (isSummaryEmptyText(summary)) return 0;
        if (isKeywordFallbackSummary(summary)) {
          const lenFallback = normalizeCompareText(summary).length;
          return Math.min(24, lenFallback);
        }
        let score = 0;
        const len = normalizeCompareText(summary).length;
        score += Math.min(170, len);
        if (!isSummarySameAsTitle(summary, titleText)) score += 180;
        if (!/https?:\/\//i.test(summary)) score += 40;
        if ((item?.categories || []).length) score += 14;
        if (item?.imgUrl) score += 8;
        return score;
      }

      function pickBetterDuplicateItem(a, b) {
        const qa = summaryQualityScore(a);
        const qb = summaryQualityScore(b);
        if (qb !== qa) return qb > qa ? b : a;
        const ae = getEngagementScore(a);
        const be = getEngagementScore(b);
        if (be !== ae) return be > ae ? b : a;
        return toDateMs(b?.pubDate) > toDateMs(a?.pubDate) ? b : a;
      }

      function dedupeByGuidOrLink(items) {
        const out = [];
        const seen = new Set();
        for (const it of items || []) {
          const key = String(it?.guid || canonicalLinkKey(it?.link || "") || normalizeCompareText(it?.title || "")).trim();
          if (!key || seen.has(key)) continue;
          seen.add(key);
          out.push(it);
        }
        return out;
      }

      function dedupeItems(items) {
        const map = new Map();
        for (const it of items || []) {
          const titleKey = normalizeCompareText(it?.title || "").slice(0, 140);
          const linkKey = canonicalLinkKey(it?.link || "");
          const summaryKey = normalizeCompareText(getNormalizedSummaryForItem(it)).slice(0, 140);
          const keys = [
            it?.guid ? `g:${it.guid}` : "",
            linkKey ? `l:${linkKey}` : "",
            titleKey ? `t:${titleKey}` : "",
            titleKey && summaryKey ? `ts:${titleKey}|${summaryKey}` : "",
          ].filter(Boolean);
          if (!keys.length) continue;

          let picked = it;
          for (const k of keys) {
            if (!map.has(k)) continue;
            picked = pickBetterDuplicateItem(map.get(k), picked);
          }
          keys.forEach((k) => map.set(k, picked));
        }
        const unique = Array.from(new Set(map.values()));
        const merged = [];
        for (const it of unique) {
          let hit = -1;
          for (let i = 0; i < merged.length; i++) {
            if (isNearDuplicateByTitle(it, merged[i]) || isNearDuplicateByContent(it, merged[i])) {
              hit = i;
              break;
            }
          }
          if (hit === -1) merged.push(it);
          else merged[hit] = pickBetterDuplicateItem(merged[hit], it);
        }
        const preferred = merged.filter((it) => summaryQualityScore(it) >= 160);
        const rest = merged.filter((it) => !preferred.includes(it));
        return preferred.concat(rest);
      }

      function sortHotItems(items) {
        const all = (items || []).slice();
        const tokenFreq = buildIssueTokenFrequency(all);
        const sorted = all.sort((a, b) => {
          const avEng = getEngagementScore(a);
          const bvEng = getEngagementScore(b);
          const avIssue = getIssueFrequencyScore(a, tokenFreq);
          const bvIssue = getIssueFrequencyScore(b, tokenFreq);
          const avSummary = summaryQualityScore(a);
          const bvSummary = summaryQualityScore(b);
          const avTech = getProductTechBoost(a);
          const bvTech = getProductTechBoost(b);
          const avLaunch = getLaunchPriorityScore(a);
          const bvLaunch = getLaunchPriorityScore(b);
          const avLowSignal = getLowSignalPenalty(a);
          const bvLowSignal = getLowSignalPenalty(b);
          const avPrimarySourceBoost = isPrimaryCardSource(a?.sourceFeed || "") ? 120 : 0;
          const bvPrimarySourceBoost = isPrimaryCardSource(b?.sourceFeed || "") ? 120 : 0;
          const avProductPriority =
            (isProductTechNews(a) ? 220 : -120) +
            (hasProductDetailCard(a, true) ? 140 : 0) +
            (isLaunchUpdatePriorityItem(a, false) ? 90 : 0);
          const bvProductPriority =
            (isProductTechNews(b) ? 220 : -120) +
            (hasProductDetailCard(b, true) ? 140 : 0) +
            (isLaunchUpdatePriorityItem(b, false) ? 90 : 0);
          const avTotal =
            avLaunch * 2.9 +
            avTech * 2.45 +
            avSummary * 0.92 +
            avIssue * 0.52 +
            avEng * 0.34 +
            avProductPriority +
            avPrimarySourceBoost -
            avLowSignal * 1.3;
          const bvTotal =
            bvLaunch * 2.9 +
            bvTech * 2.45 +
            bvSummary * 0.92 +
            bvIssue * 0.52 +
            bvEng * 0.34 +
            bvProductPriority +
            bvPrimarySourceBoost -
            bvLowSignal * 1.3;
          if (bvTotal !== avTotal) return bvTotal - avTotal;
          if (bvLaunch !== avLaunch) return bvLaunch - avLaunch;
          if (bvTech !== avTech) return bvTech - avTech;
          if (bvPrimarySourceBoost !== avPrimarySourceBoost) return bvPrimarySourceBoost - avPrimarySourceBoost;
          if (bvProductPriority !== avProductPriority) return bvProductPriority - avProductPriority;
          if (avLowSignal !== bvLowSignal) return avLowSignal - bvLowSignal;
          if (bvSummary !== avSummary) return bvSummary - avSummary;
          if (bvEng !== avEng) return bvEng - avEng;
          if (bvIssue !== avIssue) return bvIssue - avIssue;
          return toDateMs(b.pubDate) - toDateMs(a.pubDate);
        });
        return { sorted, sortBasis: "issue" };
      }

      function buildHotBundleFromItems(items, endDateStr, selectionLimit = HOT_LIMIT) {
        const endDate = parseDateInputToUtc(endDateStr);
        const weekMeta = buildMonthWeekMeta(endDate);
        const endExclusiveMs = Date.UTC(endDate.getUTCFullYear(), endDate.getUTCMonth(), endDate.getUTCDate() + 1);
        const startMs = endExclusiveMs - HOT_WINDOW_DAYS * 24 * 60 * 60 * 1000;
        const inWindow = (items || []).filter((it) => {
          const ms = toDateMs(it.pubDate);
          if (!ms || !Number.isFinite(ms)) return false;
          return ms >= startMs && ms < endExclusiveMs;
        });
        const withoutPromo = inWindow.filter((it) => !isPromotionalSelfPost(it) && !isSubjectiveStyleStory(it));
        const deduped = dedupeItems(withoutPromo);
        const { sorted, sortBasis } = sortHotItems(deduped);
        const eligible = sorted.filter((it) => isSourcePriorityCandidate(it, false));
        const relaxedEligible = sorted.filter((it) => isSourcePriorityCandidate(it, true));
        const preferred = eligible.filter((it) => isGoodSummaryItem(it));
        const cap = Math.max(HOT_LIMIT, Number(selectionLimit) || HOT_LIMIT);
        const picked = preferred.slice(0, cap);
        let selected = fillHotItems(picked, eligible, cap);
        if (selected.length < cap) {
          const relaxedPool = dedupeItems([...eligible, ...relaxedEligible]);
          selected = fillHotItems(selected, relaxedPool, cap, { allowRelaxedSummary: true });
        }
        if (selected.length < cap) {
          const lastResortPool = dedupeItems(relaxedEligible);
          selected = fillHotItems(selected, lastResortPool, cap, { allowRelaxedSummary: true, allowAnySummary: true });
        }
        if (selected.length < cap) {
          const identityTopupPool = dedupeByGuidOrLink([...relaxedEligible, ...sorted]);
          selected = topUpItemsByIdentity(selected, identityTopupPool, cap, (it) => isSourcePriorityCandidate(it, true));
        }
        const windowLabel = formatMonthWeekLabel(weekMeta);
        return { items: selected, sortBasis, windowLabel, weekMeta };
      }

      function diversifyBySource(items, limit, perSourceMax) {
        const out = [];
        const bySource = new Map();
        for (const it of items || []) {
          if (out.length >= limit) break;
          const source = it?.sourceFeed || "default";
          const used = bySource.get(source) || 0;
          if (used >= perSourceMax) continue;
          out.push(it);
          bySource.set(source, used + 1);
        }
        if (out.length >= limit) return out.slice(0, limit);
        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          out.push(it);
        }
        return out.slice(0, limit);
      }

      function getTopicCandidateTokens(item, tokenFreq) {
        const tokens = buildIssueTokens(item)
          .filter((tok) => (tokenFreq.get(tok) || 0) >= 2)
          .filter((tok) => !TOPIC_DIVERSITY_EXCLUDE.has(tok));
        if (!tokens.length) return [];
        // Prefer more specific tokens first: lower global frequency first.
        tokens.sort((a, b) => (tokenFreq.get(a) || 0) - (tokenFreq.get(b) || 0));
        return tokens.slice(0, 3);
      }

      function diversifyByTopic(items, limit, perTopicMax) {
        const out = [];
        const tokenFreq = buildIssueTokenFrequency(items || []);
        const byTopic = new Map();
        const consume = (it, maxPerTopic) => {
          const topics = getTopicCandidateTokens(it, tokenFreq);
          if (topics.length) {
            for (const topic of topics) {
              const used = byTopic.get(topic) || 0;
              if (used >= maxPerTopic) return false;
            }
          }
          out.push(it);
          topics.forEach((topic) => byTopic.set(topic, (byTopic.get(topic) || 0) + 1));
          return true;
        };

        for (const it of items || []) {
          if (out.length >= limit) break;
          consume(it, perTopicMax);
        }
        if (out.length >= limit) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          consume(it, perTopicMax + 1);
        }
        if (out.length >= limit) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          out.push(it);
        }
        return out.slice(0, limit);
      }

      function containsTopicToken(text, token) {
        if (!text || !token) return false;
        return text.includes(` ${token} `) || text.startsWith(`${token} `) || text.endsWith(` ${token}`) || text === token;
      }

      function detectOverrepTopicKeys(item) {
        const text = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        if (!text) return [];

        const keys = [];
        const hasOpenAI = containsTopicToken(text, "openai");
        const hasIndia = containsTopicToken(text, "india") || containsTopicToken(text, "indian");
        const hasPine = containsTopicToken(text, "pine");
        const hasLabs = containsTopicToken(text, "labs");

        if (hasOpenAI && hasIndia) keys.push("openai_india");
        if (hasIndia && hasPine && hasLabs) keys.push("pine_labs_india");
        if (hasOpenAI && hasPine && hasLabs) keys.push("openai_pine_labs");

        for (const key of Object.keys(OVERREP_TOPIC_LIMITS)) {
          if (containsTopicToken(text, key)) keys.push(key);
        }
        return Array.from(new Set(keys));
      }

      function diversifyOverrepTopics(items, limit, strict = false) {
        const out = [];
        const byKey = new Map();
        const topicLimits = { ...OVERREP_TOPIC_LIMITS, ...OVERREP_COMPOSITE_TOPIC_LIMITS };
        const tryPush = (it, relaxed) => {
          const keys = detectOverrepTopicKeys(it);
          if (!keys.length) {
            out.push(it);
            return true;
          }

          for (const key of keys) {
            const max = (topicLimits[key] || 99) + (relaxed ? 1 : 0);
            const used = byKey.get(key) || 0;
            if (used >= max) return false;
          }

          out.push(it);
          keys.forEach((key) => byKey.set(key, (byKey.get(key) || 0) + 1));
          return true;
        };

        for (const it of items || []) {
          if (out.length >= limit) break;
          tryPush(it, false);
        }
        if (out.length >= limit) return out.slice(0, limit);
        if (strict) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          tryPush(it, true);
        }
        if (out.length >= limit) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          out.push(it);
        }
        return out.slice(0, limit);
      }

      function getItemIdentityKey(item) {
        const linkKey = canonicalLinkKey(item?.link || "");
        if (linkKey) return `l:${linkKey}`;
        const titleKey = normalizeCompareText(item?.title || "").slice(0, 120);
        const dateKey = utcDateKey(item?.pubDate || "") || String(toDateMs(item?.pubDate || ""));
        return `t:${titleKey}|d:${dateKey}`;
      }

      function fillHotItems(baseItems, candidatePool, limit, options = {}) {
        const allowRelaxedSummary = !!options.allowRelaxedSummary;
        const allowAnySummary = !!options.allowAnySummary;
        const out = [];
        const seen = new Set();
        const byTopic = new Map();
        const byCluster = new Map();
        const topicLimits = { ...OVERREP_TOPIC_LIMITS, ...OVERREP_COMPOSITE_TOPIC_LIMITS };

        const canUseTopic = (item, relaxed) => {
          const keys = detectOverrepTopicKeys(item);
          for (const key of keys) {
            const cap = (topicLimits[key] || 99) + (relaxed ? 1 : 0);
            const used = byTopic.get(key) || 0;
            if (used >= cap) return false;
          }
          return true;
        };

        const markTopic = (item) => {
          const keys = detectOverrepTopicKeys(item);
          keys.forEach((key) => byTopic.set(key, (byTopic.get(key) || 0) + 1));
        };

        const canUseCluster = (item, relaxed) => {
          const key = getTitleClusterKey(item);
          if (!key) return true;
          const cap = relaxed ? 2 : 1;
          const used = byCluster.get(key) || 0;
          return used < cap;
        };

        const markCluster = (item) => {
          const key = getTitleClusterKey(item);
          if (!key) return;
          byCluster.set(key, (byCluster.get(key) || 0) + 1);
        };

        const isDistinct = (item, relaxed) => {
          const contentCap = relaxed ? 0.56 : 0.44;
          const titleCap = relaxed ? 0.58 : 0.46;
          return !out.some(
            (picked) =>
              isNearDuplicateByTitle(item, picked) ||
              isNearDuplicateByContent(item, picked) ||
              contentSimilarity(item, picked) >= contentCap ||
              titleSimilarity(item, picked) >= titleCap,
          );
        };

        const tryPush = (item, relaxedTopic, relaxedSimilarity) => {
          if (!item) return false;
          const passesSummary =
            isGoodSummaryItem(item) ||
            (allowRelaxedSummary && hasRelaxedArticleSummary(item)) ||
            (allowAnySummary && hasAnyUsableSummary(item));
          if (!passesSummary) return false;
          const key = getItemIdentityKey(item);
          if (seen.has(key)) return false;
          if (!canUseTopic(item, relaxedTopic)) return false;
          if (!canUseCluster(item, relaxedSimilarity)) return false;
          if (!isDistinct(item, relaxedSimilarity)) return false;
          out.push(item);
          seen.add(key);
          markTopic(item);
          markCluster(item);
          return true;
        };

        const passes = [
          { list: baseItems || [], relaxedTopic: false, relaxedSimilarity: false },
          { list: candidatePool || [], relaxedTopic: false, relaxedSimilarity: false },
          { list: candidatePool || [], relaxedTopic: true, relaxedSimilarity: false },
          { list: candidatePool || [], relaxedTopic: true, relaxedSimilarity: true },
        ];

        for (const pass of passes) {
          for (const item of pass.list) {
            if (out.length >= limit) break;
            tryPush(item, pass.relaxedTopic, pass.relaxedSimilarity);
          }
          if (out.length >= limit) break;
        }

        return out.slice(0, limit);
      }

      function topUpItemsByIdentity(baseItems, candidatePool, limit, predicate = null) {
        const out = Array.isArray(baseItems) ? baseItems.slice(0, limit) : [];
        const seen = new Set(out.map((it) => getItemIdentityKey(it)));
        const pool = Array.isArray(candidatePool) ? candidatePool : [];
        for (const cand of pool) {
          if (out.length >= limit) break;
          if (!cand) continue;
          if (typeof predicate === "function" && !predicate(cand)) continue;
          const key = getItemIdentityKey(cand);
          if (seen.has(key)) continue;
          out.push(cand);
          seen.add(key);
        }
        return out.slice(0, limit);
      }

      function areSummarySentencesTooSimilar(a, b) {
        const na = normalizeCompareText(a || "");
        const nb = normalizeCompareText(b || "");
        if (!na || !nb) return false;
        if (na === nb) return true;
        if (na.length >= 26 && nb.length >= 26 && (na.includes(nb) || nb.includes(na))) return true;
        const sa = tokenSetFromNormalizedText(na);
        const sb = tokenSetFromNormalizedText(nb);
        if (!sa.size || !sb.size) return false;
        const j = jaccardSimilarity(sa, sb);
        return j >= 0.74;
      }

      function splitEnglishSummarySentences(text) {
        return decodeHtmlEntitiesText(text || "")
          .split(/(?<=[.!?])\s+|\n+/)
          .map((s) => s.replace(/\s+/g, " ").trim())
          .filter((s) => s && s.length >= 22)
          .map((s) => (/[.!?]$/.test(s) ? s : `${s}.`));
      }

      function enrichCanonicalSummaryEn(primaryItem, relatedItems = []) {
        if (!primaryItem) return;
        const canonical = ensureCanonicalCardText(primaryItem);
        const titleHint = canonical.titleEn || decodeHtmlEntitiesText(primaryItem?.title || "");
        let baseSummary = decodeHtmlEntitiesText(canonical.summaryEn || "").trim();
        if (!baseSummary || isSummaryEmptyText(baseSummary)) {
          baseSummary = buildEmergencySummaryText(primaryItem?.summaryText || "", titleHint);
        }
        if (!baseSummary) return;

        const MIN_TARGET = 260;
        const MAX_TARGET = 620;
        const picked = [];
        const pushSentence = (sentence) => {
          const clean = decodeHtmlEntitiesText(sentence || "").replace(/\s+/g, " ").trim();
          if (!clean || clean.length < 22) return false;
          const formatted = /[.!?]$/.test(clean) ? clean : `${clean}.`;
          if (picked.some((prev) => areSummarySentencesTooSimilar(prev, formatted))) return false;
          const next = picked.length ? `${picked.join(" ")} ${formatted}` : formatted;
          const nextLen = normalizeCompareText(next).length;
          if (nextLen > MAX_TARGET && normalizeCompareText(picked.join(" ")).length >= MIN_TARGET) return false;
          picked.push(formatted);
          return true;
        };

        splitEnglishSummarySentences(baseSummary).forEach((s) => pushSentence(s));

        const candidateTexts = [];
        const selfDetail = buildDetailSupplementText(primaryItem?.summaryText || "", titleHint);
        if (selfDetail) candidateTexts.push(selfDetail);
        const headlineLead = proofreadEnglishHeadlineText(titleHint);
        if (headlineLead) candidateTexts.push(/[.!?]$/.test(headlineLead) ? headlineLead : `${headlineLead}.`);

        (relatedItems || []).forEach((rel) => {
          if (!rel || rel === primaryItem) return;
          const relCanonical = ensureCanonicalCardText(rel);
          if (relCanonical.summaryEn && !isSummaryEmptyText(relCanonical.summaryEn)) candidateTexts.push(relCanonical.summaryEn);
          const relDetail = buildDetailSupplementText(rel?.summaryText || "", relCanonical.titleEn || rel?.title || "");
          if (relDetail) candidateTexts.push(relDetail);
        });

        for (const text of candidateTexts) {
          for (const sentence of splitEnglishSummarySentences(text)) {
            const added = pushSentence(sentence);
            if (!added) continue;
            const len = normalizeCompareText(picked.join(" ")).length;
            if (len >= MIN_TARGET && picked.length >= 3) break;
          }
          const currentLen = normalizeCompareText(picked.join(" ")).length;
          if (currentLen >= MIN_TARGET && picked.length >= 3) break;
        }

        let merged = picked.join(" ").replace(/\s+/g, " ").trim();
        merged = proofreadEnglishSummaryText(merged, titleHint);
        if (!merged || isSummaryEmptyText(merged)) return;
        primaryItem.cardSummaryEn = merged;
      }

      function consolidateSimilarHotItems(baseItems, fallbackPool, limit = HOT_LIMIT) {
        const seeds = Array.isArray(baseItems) ? baseItems.filter(Boolean) : [];
        if (!seeds.length) return [];

        const clusters = [];
        const isSameTopic = (a, b) =>
          isNearDuplicateByTitle(a, b) ||
          isNearDuplicateByContent(a, b) ||
          contentSimilarity(a, b) >= 0.37 ||
          titleSimilarity(a, b) >= 0.42;

        seeds.forEach((item, idx) => {
          let hit = -1;
          for (let i = 0; i < clusters.length; i++) {
            if (isSameTopic(item, clusters[i].lead)) {
              hit = i;
              break;
            }
          }
          if (hit === -1) {
            clusters.push({ lead: item, members: [item], firstIdx: idx });
          } else {
            clusters[hit].members.push(item);
          }
        });

        const out = clusters
          .map((cluster) => {
            const best = cluster.members.reduce((acc, cur) => (acc ? pickBetterDuplicateItem(acc, cur) : cur), null);
            const others = cluster.members.filter((it) => it !== best);
            const mergedCategories = Array.from(new Set(cluster.members.flatMap((it) => it?.categories || []))).slice(0, 5);
            if (best && mergedCategories.length) best.categories = mergedCategories;
            if (best) enrichCanonicalSummaryEn(best, others);
            return { item: best, firstIdx: cluster.firstIdx };
          })
          .filter((x) => !!x.item)
          .sort((a, b) => a.firstIdx - b.firstIdx)
          .map((x) => x.item);

        const seen = new Set(out.map((it) => getItemIdentityKey(it)));
        const pool = Array.isArray(fallbackPool) ? fallbackPool : [];
        for (const cand of pool) {
          if (out.length >= limit) break;
          if (!cand) continue;
          const key = getItemIdentityKey(cand);
          if (seen.has(key)) continue;
          const duplicate = out.some((picked) => isSameTopic(cand, picked));
          if (duplicate) continue;
          enrichCanonicalSummaryEn(cand, []);
          out.push(cand);
          seen.add(key);
        }

        return out.slice(0, limit);
      }

      function getTitleClusterKey(item) {
        const tokens = normalizeCompareText(item?.title || "")
          .split(/\s+/)
          .filter((tok) => tok && tok.length >= 4 && !ISSUE_STOPWORDS.has(tok) && !TITLE_CLUSTER_EXCLUDE.has(tok));
        const uniq = Array.from(new Set(tokens));
        if (!uniq.length) return "";
        if (uniq.length === 1) return uniq[0];
        return `${uniq[0]}|${uniq[1]}`;
      }

      function diversifyByTitleCluster(items, limit, maxPerCluster) {
        const out = [];
        const byCluster = new Map();
        const consume = (it, relaxed) => {
          const key = getTitleClusterKey(it);
          if (!key) {
            out.push(it);
            return true;
          }
          const cap = (Number.isFinite(maxPerCluster) ? maxPerCluster : 1) + (relaxed ? 1 : 0);
          const used = byCluster.get(key) || 0;
          if (used >= cap) return false;
          out.push(it);
          byCluster.set(key, used + 1);
          return true;
        };

        for (const it of items || []) {
          if (out.length >= limit) break;
          consume(it, false);
        }
        if (out.length >= limit) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          consume(it, true);
        }
        if (out.length >= limit) return out.slice(0, limit);

        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          out.push(it);
        }
        return out.slice(0, limit);
      }

      function diversifyBySimilarity(items, limit, similarityThreshold) {
        const out = [];
        const deferred = [];
        const threshold = Number.isFinite(similarityThreshold) ? similarityThreshold : 0.5;
        for (const it of items || []) {
          if (out.length >= limit) break;
          const tooSimilar = out.some(
            (picked) =>
              isNearDuplicateByTitle(it, picked) ||
              isNearDuplicateByContent(it, picked) ||
              contentSimilarity(it, picked) >= threshold ||
              titleSimilarity(it, picked) >= 0.44,
          );
          if (tooSimilar) deferred.push(it);
          else out.push(it);
        }
        if (out.length >= limit) return out.slice(0, limit);
        for (const it of deferred) {
          if (out.length >= limit) break;
          const tooSimilar = out.some(
            (picked) => contentSimilarity(it, picked) >= threshold + 0.06 || titleSimilarity(it, picked) >= 0.56,
          );
          if (!tooSimilar) out.push(it);
        }
        if (out.length >= limit) return out.slice(0, limit);
        for (const it of items || []) {
          if (out.length >= limit) break;
          if (out.includes(it)) continue;
          out.push(it);
        }
        return out.slice(0, limit);
      }

      function contentSimilarity(a, b) {
        const sa = contentTokenSet(a);
        const sb = contentTokenSet(b);
        return jaccardSimilarity(sa, sb);
      }

      function titleSimilarity(a, b) {
        const sa = titleTokenSet(a);
        const sb = titleTokenSet(b);
        return jaccardSimilarity(sa, sb);
      }

      function rebalanceForProductTech(selectedItems, candidatePool, limit, minProductCount) {
        const out = (selectedItems || []).slice(0, limit);
        const pool = Array.isArray(candidatePool) ? candidatePool : [];
        let productCount = out.filter((it) => isProductTechNews(it)).length;
        if (productCount >= minProductCount) return out;

        for (const cand of pool) {
          if (productCount >= minProductCount) break;
          if (!cand || out.includes(cand)) continue;
          if (!isProductTechNews(cand)) continue;

          let replaceIdx = -1;
          for (let i = out.length - 1; i >= 0; i--) {
            if (!isProductTechNews(out[i])) {
              replaceIdx = i;
              break;
            }
          }
          if (replaceIdx === -1) break;
          out[replaceIdx] = cand;
          productCount++;
        }
        return out.slice(0, limit);
      }

      function ensureSourcePresence(selectedItems, candidatePool, sourceKey, minCount = 1, limit = HOT_LIMIT) {
        const out = (selectedItems || []).slice(0, limit);
        const key = String(sourceKey || "").trim();
        if (!key || minCount <= 0) return out;

        const itemKey = (it) => String(it?.guid || it?.link || it?.title || "").trim();
        const existing = new Set(out.map(itemKey).filter(Boolean));
        let currentCount = out.filter((it) => String(it?.sourceFeed || "") === key).length;
        if (currentCount >= minCount) return out;

        const pool = (candidatePool || []).filter((it) => String(it?.sourceFeed || "") === key);
        for (const cand of pool) {
          if (currentCount >= minCount) break;
          const cKey = itemKey(cand);
          if (cKey && existing.has(cKey)) continue;

          let replaceIdx = -1;
          for (let i = out.length - 1; i >= 0; i--) {
            if (String(out[i]?.sourceFeed || "") !== key) {
              replaceIdx = i;
              break;
            }
          }

          if (replaceIdx === -1) {
            if (out.length >= limit) break;
            out.push(cand);
          } else {
            out[replaceIdx] = cand;
          }
          if (cKey) existing.add(cKey);
          currentCount++;
        }

        return out.slice(0, limit);
      }

      function ensureTopPriorityItems(selectedItems, candidatePool, topCount = LAUNCH_TOP_RANK_COUNT, limit = HOT_LIMIT) {
        const out = (selectedItems || []).slice(0, limit);
        const target = Math.min(limit, Math.max(0, Number(topCount) || 0));
        if (!target || !out.length) return out;

        const itemKey = (it) => String(it?.guid || it?.link || it?.title || "").trim();
        const topCandidatesStrict = (candidatePool || [])
          .filter(Boolean)
          .filter((it) => isLaunchUpdatePriorityItem(it, true))
          .sort((a, b) => getLaunchPriorityScore(b) - getLaunchPriorityScore(a));
        const topCandidatesRelaxed = (candidatePool || [])
          .filter(Boolean)
          .filter((it) => isLaunchUpdatePriorityItem(it, false))
          .sort((a, b) => getLaunchPriorityScore(b) - getLaunchPriorityScore(a));

        const pushUnique = (targetArr, sourceArr, maxCount) => {
          const used = new Set(targetArr.map(itemKey).filter(Boolean));
          for (const it of sourceArr || []) {
            if (targetArr.length >= maxCount) break;
            const key = itemKey(it);
            if (key && used.has(key)) continue;
            targetArr.push(it);
            if (key) used.add(key);
          }
        };

        const top = [];
        pushUnique(
          top,
          out.filter((it) => isLaunchUpdatePriorityItem(it, true)).sort((a, b) => getLaunchPriorityScore(b) - getLaunchPriorityScore(a)),
          target,
        );
        pushUnique(top, topCandidatesStrict, target);
        if (top.length < target) {
          pushUnique(
            top,
            out.filter((it) => isLaunchUpdatePriorityItem(it, false)).sort((a, b) => getLaunchPriorityScore(b) - getLaunchPriorityScore(a)),
            target,
          );
          pushUnique(top, topCandidatesRelaxed, target);
        }
        if (!top.length) return out;

        const topKeySet = new Set(top.map(itemKey).filter(Boolean));
        const rest = [];
        for (const it of out) {
          const key = itemKey(it);
          if (key && topKeySet.has(key)) continue;
          rest.push(it);
        }
        return [...top, ...rest].slice(0, limit);
      }

      async function fetchWeeklyHotItemsSingle(feedKey, endDateStr) {
        const feed = FEEDS.find((f) => f.key === feedKey) || null;
        if (feed?.parser === "aitimes_list" || feedKey === "aitimes_industry") {
          if (!feed?.url) {
            return {
              meta: { title: feedKey, link: "", updated: "" },
              items: [],
              windowLabel: "",
              weekMeta: null,
              sortBasis: "issue",
            };
          }
          const sourceItems = await fetchSourceItemsWithParser(feed);
          const endDate = parseDateInputToUtc(endDateStr);
          const weekMeta = buildMonthWeekMeta(endDate);
          const endExclusiveMs = Date.UTC(endDate.getUTCFullYear(), endDate.getUTCMonth(), endDate.getUTCDate() + 1);
          const startMs = endExclusiveMs - HOT_WINDOW_DAYS * 24 * 60 * 60 * 1000;
          const inWindow = (sourceItems || []).filter((it) => {
            const ms = toDateMs(it?.pubDate || "");
            return ms >= startMs && ms < endExclusiveMs;
          });
          const withoutPromo = inWindow.filter((it) => !isPromotionalSelfPost(it) && !isSubjectiveStyleStory(it));
          const deduped = dedupeByGuidOrLink(withoutPromo);
          const { sorted, sortBasis } = sortHotItems(deduped);
          const aiTimesPreferred = dedupeByGuidOrLink(sorted.filter((it) => isSourcePriorityCandidate(it, false)));
          const relaxedCandidates = dedupeByGuidOrLink(sorted.filter((it) => isSourcePriorityCandidate(it, true)));
          let selected = dedupeByGuidOrLink([...aiTimesPreferred, ...relaxedCandidates]);
          if (!selected.length) {
            selected = dedupeByGuidOrLink(sorted.filter((it) => isSourcePriorityCandidate(it, true)));
          }
          const aiTimesBackfillPool = dedupeByGuidOrLink(
            (inWindow || [])
              .map((it) => ({
                ...it,
                sourceFeed: "aitimes_industry",
                sourceFeedTitle: lastFeedMeta?.title || feed.label || "AI Times - AI Industry",
              }))
              .filter(
                (it) =>
                  !isPromotionalSelfPost(it) &&
                  !isSubjectiveStyleStory(it) &&
                  isSourcePriorityCandidate(it, true),
              ),
          ).sort((a, b) => {
            const launchDelta = getLaunchPriorityScore(b) - getLaunchPriorityScore(a);
            if (launchDelta !== 0) return launchDelta;
            return toDateMs(b?.pubDate || "") - toDateMs(a?.pubDate || "");
          });
          lastAiTimesBackfillItems = aiTimesBackfillPool;
          lastAiTimesEmergencyItems = aiTimesBackfillPool.slice();
          const windowLabel = formatMonthWeekLabel(weekMeta);
          return {
            meta: lastFeedMeta?.title ? lastFeedMeta : { title: feed.label || feedKey, link: feed.url, updated: "" },
            items: selected,
            windowLabel,
            weekMeta: weekMeta || null,
            sortBasis,
          };
        }
        try {
          const latest = await fetchFeedJson(feedKey, "");

          const endDate = parseDateInputToUtc(endDateStr);
          const dateKeys = buildWindowDates(endDate, HOT_WINDOW_DAYS);
          const snapshots = await Promise.allSettled(dateKeys.map((d) => fetchFeedJson(feedKey, d)));
          const weeklyItems = [];
          snapshots.forEach((r) => {
            if (r.status === "fulfilled" && Array.isArray(r.value?.items)) {
              weeklyItems.push(...r.value.items);
            }
          });

          const sourceItems = weeklyItems.length ? weeklyItems : latest.items || [];
          if (!sourceItems.length && feed?.url) {
            const parsedItems = await fetchSourceItemsWithParser(feed);
            const parsedBundle = buildHotBundleFromItems(parsedItems, endDateStr);
            const parsedConsolidated = consolidateSimilarHotItems(parsedBundle.items, parsedBundle.items, HOT_LIMIT);
            return {
              meta: lastFeedMeta?.title ? lastFeedMeta : { title: feed.label || feedKey, link: feed.url, updated: "" },
              items: parsedConsolidated,
              windowLabel: parsedBundle.windowLabel,
              weekMeta: parsedBundle.weekMeta || null,
              sortBasis: parsedBundle.sortBasis,
            };
          }
          const bundle = buildHotBundleFromItems(sourceItems, endDateStr);
          const consolidatedItems = consolidateSimilarHotItems(bundle.items, bundle.items, HOT_LIMIT);

          return {
            meta: latest.meta || {},
            items: consolidatedItems,
            windowLabel: bundle.windowLabel,
            weekMeta: bundle.weekMeta || null,
            sortBasis: bundle.sortBasis,
          };
        } catch (backendErr) {
          if (!feed?.url) throw backendErr;
          const sourceItems = await fetchSourceItemsWithParser(feed);
          const bundle = buildHotBundleFromItems(sourceItems, endDateStr);
          const consolidatedItems = consolidateSimilarHotItems(bundle.items, bundle.items, HOT_LIMIT);
          return {
            meta: lastFeedMeta?.title ? lastFeedMeta : { title: feed.label || feedKey, link: feed.url, updated: "" },
            items: consolidatedItems,
            windowLabel: bundle.windowLabel,
            weekMeta: bundle.weekMeta || null,
            sortBasis: bundle.sortBasis,
          };
        }
      }

      async function fetchWeeklyHotItems(feedKey, endDateStr) {
        lastAiTimesBackfillItems = [];
        lastAiTimesEmergencyItems = [];
        if (feedKey !== "all_ai") {
          return await fetchWeeklyHotItemsSingle(feedKey, endDateStr);
        }

        const sourceKeys = getSelectedAggregateSourceKeys();
        const endDate = parseDateInputToUtc(endDateStr);
        const endExclusiveMs = Date.UTC(endDate.getUTCFullYear(), endDate.getUTCMonth(), endDate.getUTCDate() + 1);
        const startMs = endExclusiveMs - HOT_WINDOW_DAYS * 24 * 60 * 60 * 1000;
        const settled = await Promise.allSettled(sourceKeys.map((k) => fetchWeeklyHotItemsSingle(k, endDateStr)));
        const mergedItems = [];
        const activeSources = [];
        let windowLabel = "";
        let sortBasis = "issue";

        settled.forEach((r, idx) => {
          if (r.status !== "fulfilled") return;
          const key = sourceKeys[idx];
          const feedMetaTitle = r.value?.meta?.title || FEEDS.find((f) => f.key === key)?.label || key;
          const items = Array.isArray(r.value?.items) ? r.value.items : [];
          if (!items.length) return;
          activeSources.push(feedMetaTitle);
          items.forEach((it) => {
            mergedItems.push({ ...it, sourceFeed: key, sourceFeedTitle: feedMetaTitle });
          });
          if (!windowLabel && r.value?.windowLabel) windowLabel = r.value.windowLabel;
          if (sortBasis !== "views" && r.value?.sortBasis === "views") sortBasis = "views";
        });

        if (sourceKeys.includes("aitimes_industry") && !mergedItems.some((it) => String(it?.sourceFeed || "") === "aitimes_industry")) {
          const aiTimesFeed = FEEDS.find((f) => f.key === "aitimes_industry");
          if (aiTimesFeed?.url) {
            try {
              const aiTimesItems = await fetchSourceItemsWithParser(aiTimesFeed);
              const aiTimesTitle = lastFeedMeta?.title || aiTimesFeed.label;
              aiTimesItems.forEach((it) => {
                mergedItems.push({ ...it, sourceFeed: "aitimes_industry", sourceFeedTitle: aiTimesTitle });
              });
              if (aiTimesItems.length) activeSources.push(aiTimesTitle);
            } catch (e) {
              log("aitimes-fallback-error", { error: String(e?.message || e) });
            }
          }
        }

        const aiTimesMergedCandidates = mergedItems.filter(
          (it) =>
            String(it?.sourceFeed || "") === "aitimes_industry" &&
            !isPromotionalSelfPost(it) &&
            !isSubjectiveStyleStory(it) &&
            isSourcePriorityCandidate(it, true),
        );

            if (!inWindow || isPromotionalSelfPost(it) || isSubjectiveStyleStory(it)) return false;
            return isProductTechCardCandidate(it, true);
          });
          filtered = topUpItemsByIdentity(filtered, renderRelaxedProductPool, HOT_LIMIT);
        }

        elGrid.classList.add("hotList");
        if (!filtered.length) {
          elGrid.innerHTML = `<div class="note">${t("no_items")}</div>`;
          return;
        }

        log("render-hot", { total: filtered.length });

        const cardHtml = [];
        const renderItems = [];
        const bgAssignments = buildFallbackCardBgAssignments(filtered);
        filtered.forEach((it, idx) => {
          const canonical = ensureCanonicalCardText(it);
          let titleText =
            currentLang === "ko"
              ? decodeHtmlEntitiesText(it.cardTitleKo || it.titleKo || canonical.titleEn)
              : decodeHtmlEntitiesText(canonical.titleEn);
          if (currentLang === "ko") {
            titleText = proofreadKoreanHeadlineText(stylizeKoreanHeadlineText(titleText) || titleText);
          } else {
            titleText = proofreadEnglishHeadlineText(titleText) || titleText;
            if (!titleText || /[가-힣]/.test(titleText)) {
              titleText = buildEnglishFallbackTitleFromItem(it);
            }
          }
          let summaryText =
            currentLang === "ko"
              ? decodeHtmlEntitiesText(it.cardSummaryKo || it.summaryKo || "")
              : decodeHtmlEntitiesText(canonical.summaryEn);
          if (!summaryText) summaryText = t("summary_empty");
          if (isSummaryEmptyText(summaryText)) {
            if (currentLang === "en") {
              const fallbackFromRaw = buildEmergencySummaryText(it.summaryText || "", canonical.titleEn || it.title || "");
              const fallbackFromEn = isSummaryEmptyText(canonical.summaryEn) ? "" : decodeHtmlEntitiesText(canonical.summaryEn || "");
              summaryText = fallbackFromRaw || fallbackFromEn || "";
            } else {
              const fallbackFromKoRaw = decodeHtmlEntitiesText(it.cardSummaryKo || it.summaryKo || "");
              const fallbackFromEn = isSummaryEmptyText(canonical.summaryEn) ? "" : decodeHtmlEntitiesText(canonical.summaryEn || "");
              const fallbackFromRaw = buildEmergencySummaryText(it.summaryText || "", canonical.titleEn || it.title || "");
              summaryText = fallbackFromKoRaw || fallbackFromEn || fallbackFromRaw || "";
            }
          }
          if (currentLang === "en" && summaryText && !isSummaryEmptyText(summaryText)) {
            summaryText = proofreadEnglishSummaryText(summaryText, titleText) || summaryText;
            if (/[가-힣]/.test(summaryText)) {
              summaryText = buildEnglishFallbackSummaryFromItem(it, titleText);
            }
          }
          if (currentLang === "ko" && summaryText && /[가-힣]/.test(summaryText) && !isSummaryEmptyText(summaryText)) {
            summaryText = proofreadKoreanSummaryText(summaryText) || summaryText;
          }
          if (!summaryText || isSummaryEmptyText(summaryText)) {
            const emergencySummary = buildEmergencySummaryText(it.summaryText || "", canonical.titleEn || it.title || titleText || "");
            if (emergencySummary && !isSummaryEmptyText(emergencySummary)) {
              summaryText =
                currentLang === "ko"
                  ? proofreadKoreanSummaryText(stylizeKoreanSummaryText(emergencySummary, titleText)) || emergencySummary
                  : proofreadEnglishSummaryText(emergencySummary, titleText) || emergencySummary;
            }
          }
          if (!summaryText || isSummaryEmptyText(summaryText)) {
            summaryText = currentLang === "ko" ? "자세한 내용은 원문 링크에서 확인할 수 있습니다." : "See the source link for full details.";
          }
          const creatorText = getLocalizedCreatorText(it, currentLang);
          const date = it.pubDate ? new Date(it.pubDate) : null;
          const dateText =
            date && !Number.isNaN(date.valueOf())
              ? date.toLocaleDateString(getLocale(), { year: "numeric", month: "2-digit", day: "2-digit" })
              : "";
          const rank = cardHtml.length + 1;
          const sourceText = getArticleSource(it.link || it.creator);
          const sourceMarkup = it.link
            ? `<a class="hotSourceLink" href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(sourceText)}</a>`
            : `<span class="hotSourceText">${escapeHtml(sourceText)}</span>`;
          const categoryList = currentLang === "en" ? (it.categoriesEn && it.categoriesEn.length ? it.categoriesEn : getLocalizedCategories(it, "en")) : getLocalizedCategories(it, "ko");
          const cats = (categoryList || [])
            .slice(0, 3)
            .map((c) => `<span class="pill">${escapeHtml(decodeHtmlEntitiesText(c))}</span>`)
            .join("");
          const bgInfo = bgAssignments[idx] || {
            hasSourceImage: false,
            primaryCardBg: "",
            fallbackCardBg: "./HUMAN-AI.jpg",
            fallbackCardBgSecondary: "./HUMAN-AI.jpg",
            fallbackCardBgTertiary: "./HUMAN-AI.jpg",
            fallbackCardBgQuaternary: "./HUMAN-AI.jpg",
            fallbackCardBgQuinary: "./HUMAN-AI.jpg",
          };
          const primaryCardBg = bgInfo.primaryCardBg;
          const fallbackCardBg = bgInfo.fallbackCardBg;
          const fallbackCardBgSecondary = bgInfo.fallbackCardBgSecondary;
          const fallbackCardBgTertiary = bgInfo.fallbackCardBgTertiary;
          const fallbackCardBgQuaternary = bgInfo.fallbackCardBgQuaternary;
          const fallbackCardBgQuinary = bgInfo.fallbackCardBgQuinary;
          const fallbackLayers = [fallbackCardBg, fallbackCardBgSecondary, fallbackCardBgTertiary, fallbackCardBgQuaternary, fallbackCardBgQuinary]
            .filter(Boolean)
            .map((url) => `url('${escapeHtml(url)}')`)
            .join(", ");
          const baseLayers = fallbackLayers || `url('./HUMAN-AI.jpg')`;
          const cardBgLayer = primaryCardBg
            ? `url('${escapeHtml(primaryCardBg)}'), ${baseLayers}`
            : baseLayers;
          const bgStyle = `--card-bg:${cardBgLayer};`;
          const cardClass = bgInfo.hasSourceImage ? "hotCard hotCardBg hasImage" : "hotCard hotCardBg noImage";
          cardHtml.push(`
            <article class="${cardClass}" style="--delay:${idx * 70}ms;${bgStyle}">
              <div class="hotCardOverlay"></div>
              <span class="hotRank">${t("hot_rank")} ${rank}</span>
              <div class="hotBody">
                <h3 class="hotHeadline">
                  <a href="${escapeHtml(it.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(titleText)}</a>
                </h3>
                <div class="hotMeta">
                  ${creatorText ? `<span>${escapeHtml(creatorText)}</span>` : ""}
                  ${dateText ? `<span>${escapeHtml(dateText)}</span>` : ""}
                </div>
                <p class="summaryLabel">${t("summary_label")}</p>
                <p class="hotDesc">${escapeHtml(summaryText)}</p>
                <div class="hotCats">${cats}</div>
                <div class="hotSource">
                  <span class="hotSourceLabel">${t("source_label")}</span>
                  ${sourceMarkup}
                </div>
              </div>
            </article>
          `);
          renderItems.push(it);
        });

        if (!cardHtml.length) {
          elGrid.innerHTML = `<div class="note">${t("no_items")}</div>`;
          return;
        }

        elGrid.innerHTML = `
          <div class="hotHeader">
            <div>
              <h3 class="hotTitle">${escapeHtml(getHotTitleText())}</h3>
              <p class="hotSub">${t("hot_subtitle")}</p>
            </div>
            <div class="pill">${cardHtml.length}/${HOT_LIMIT}</div>
          </div>
          <div class="hotScroller">${cardHtml.join("")}</div>
        `;

        preloadAllImagesInOrder(renderItems, 0);
        hydrateMissingImages(renderItems, items);
      }

      async function fetchFeedJson(cat, dateStr) {
        const params = new URLSearchParams({ cat });
        if (dateStr) params.set("date", dateStr);
        const url = `${BACKEND_API}?${params.toString()}`;
        log("fetch-feed", { url });
        const res = await fetchWithTimeout(url, { method: "GET", cache: "no-store" }, NETWORK_FETCH_TIMEOUT_MS);
        if (res.status === 404) {
          log("fetch-feed-404", { url });
          return { meta: { title: "", link: "", updated: "" }, items: [] };
        }
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
        return await res.json();
      }

      async function fetchRssXml(url) {
        // 브라우저 CORS 문제를 피하기 위해 프록시 사용
        return await fetchTextWithProxyRetry(url);
      }

      function toAbsoluteUrl(url, baseUrl) {
        const raw = String(url || "").trim();
        if (!raw) return "";
        try {
          return new URL(raw, baseUrl || location.href).href;
        } catch (e) {
          return raw;
        }
      }

      function normalizeAiTimesPubDate(rawDateText) {
        const raw = decodeHtmlEntitiesText(rawDateText || "");
        if (!raw) return "";

        const full = raw.match(/^(\d{4})[.-](\d{2})[.-](\d{2})(?:\s+(\d{2}):(\d{2}))?$/);
        if (full) {
          const y = Number(full[1]);
          const m = Number(full[2]);
          const d = Number(full[3]);
          const hh = Number(full[4] || "0");
          const mm = Number(full[5] || "0");
          const utcMs = Date.UTC(y, m - 1, d, hh - 9, mm, 0);
          if (!Number.isNaN(utcMs)) return new Date(utcMs).toISOString();
          return "";
        }

        const md = raw.match(/^(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
        if (md) {
          const now = new Date();
          let y = now.getFullYear();
          const m = Number(md[1]);
          const d = Number(md[2]);
          const hh = Number(md[3]);
          const mm = Number(md[4]);
          let utcMs = Date.UTC(y, m - 1, d, hh - 9, mm, 0);
          if (utcMs - Date.now() > 36 * 60 * 60 * 1000) {
            y -= 1;
            utcMs = Date.UTC(y, m - 1, d, hh - 9, mm, 0);
          }
          if (!Number.isNaN(utcMs)) return new Date(utcMs).toISOString();
        }
        return "";
      }

      function parseAiTimesList(htmlText, source) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(String(htmlText || ""), "text/html");
        const feedUrl = String(source?.url || "");
        const feedLabel = String(source?.label || "AI Times - AI Industry");

        const titleNode = doc.querySelector(".altlist-title");
        const titleRaw = titleNode?.childNodes?.[0]?.textContent || titleNode?.textContent || "";
        const feedTitle = decodeHtmlEntitiesText(titleRaw).replace(/\s+/g, " ").trim() || feedLabel;
        lastFeedMeta = { title: feedTitle, link: feedUrl, updated: "" };

        const rows = Array.from(doc.querySelectorAll("li.altlist-webzine-item"));
        const mapped = rows
          .map((row) => {
            const subjectLink =
              row.querySelector("h2.altlist-subject a") ||
              row.querySelector(".altlist-subject a") ||
              row.querySelector("a[href*='articleView.html']");
            const href = toAbsoluteUrl(subjectLink?.getAttribute("href") || "", feedUrl);
            const titleText = decodeHtmlEntitiesText(subjectLink?.textContent || "");
            const summaryText = decodeHtmlEntitiesText(row.querySelector(".altlist-summary")?.textContent || "");
            const imgNode = row.querySelector("a.altlist-image img, .altlist-image img");
            const imgRaw = toAbsoluteUrl(
              imgNode?.getAttribute("src") || imgNode?.getAttribute("data-src") || imgNode?.getAttribute("data-original") || "",
              feedUrl,
            );
            const info = Array.from(row.querySelectorAll(".altlist-info .altlist-info-item")).map((n) =>
              decodeHtmlEntitiesText(n?.textContent || ""),
            );
            const category = info[0] || "AI산업";
            const creator = info[1] || "AI Times";
            const pubDate = normalizeAiTimesPubDate(info[2] || "") || new Date().toISOString();
            const idxMatch = href.match(/[?&]idxno=(\d+)/i);
            const guid = idxMatch?.[1] ? `aitimes-${idxMatch[1]}` : href || titleText;
            if (!href || !titleText) return null;
            return {
              title: titleText,
              link: href,
              guid,
              pubDate,
              creator,
              categories: category ? [category] : ["AI산업"],
              summaryText,
              imgUrl: normalizeImageUrl(imgRaw),
            };
          })
          .filter(Boolean);

        const seen = new Set();
        const deduped = [];
        for (const it of mapped) {
          if (seen.has(it.guid)) continue;
          seen.add(it.guid);
          deduped.push(it);
        }
        return deduped;
      }

      function parseFeedPayloadForSource(source, payloadText) {
        const parserType = String(source?.parser || "");
        if (parserType === "aitimes_list" || source?.key === "aitimes_industry") {
          return parseAiTimesList(payloadText, source);
        }
        return parseRss(payloadText);
      }

      function buildAiTimesPagedUrl(baseUrl, page) {
        const safePage = Math.max(1, Number(page) || 1);
        try {
          const u = new URL(String(baseUrl || ""), location.href);
          if (safePage <= 1) {
            u.searchParams.delete("page");
            u.searchParams.delete("pageNo");
            return u.href;
          }
          u.searchParams.set("page", String(safePage));
          return u.href;
        } catch (e) {
          const raw = String(baseUrl || "").trim();
          if (!raw || safePage <= 1) return raw;
          return `${raw}${raw.includes("?") ? "&" : "?"}page=${safePage}`;
        }
      }

      async function fetchAiTimesPagedItems(source, maxPages = AITIMES_MAX_PAGES) {
        if (!source?.url) return [];
        const rawPages = Number(maxPages);
        const pages = Number.isFinite(rawPages) ? Math.max(1, rawPages) : Number.POSITIVE_INFINITY;
        const seen = new Set();
        const out = [];
        const startedAt = Date.now();

        for (let page = 1; page <= pages; page++) {
          if (Date.now() - startedAt > AITIMES_FETCH_SOFT_TIMEOUT_MS) break;
          const pageUrl = buildAiTimesPagedUrl(source.url, page);
          let payloadText = "";
          try {
            payloadText = await fetchRssXml(pageUrl);
          } catch (e) {
            if (page === 1) throw e;
            break;
          }

          const parsed = parseAiTimesList(payloadText, { ...source, url: pageUrl });
          if (!Array.isArray(parsed) || !parsed.length) break;
          let added = 0;
          for (const it of parsed || []) {
            const key = String(it?.guid || it?.link || it?.title || "").trim();
            if (!key || seen.has(key)) continue;
            seen.add(key);
            out.push(it);
            added++;
          }
          if (page > 1 && added === 0) break;
        }

        return out;
      }

      async function fetchSourceItemsWithParser(source) {
        if (!source?.url) return [];
        const parserType = String(source?.parser || "");
        if (parserType === "aitimes_list" || source?.key === "aitimes_industry") {
          return await fetchAiTimesPagedItems(source);
        }
        const payloadText = await fetchRssXml(source.url);
        return parseFeedPayloadForSource(source, payloadText);
      }

      function parseRss(xmlText) {
        const parser = new DOMParser();
        const xml = parser.parseFromString(xmlText, "text/xml");

        // 파서 체크
        const parserError = xml.querySelector("parsererror");
        if (parserError) {
          throw new Error("RSS XML 파싱 실패 (parsererror)");
        }

        const channel = xml.querySelector("channel");
        const feedTitle = channel?.querySelector("title")?.textContent?.trim?.() ?? "";
        const feedLink = channel?.querySelector("link")?.textContent?.trim?.() ?? "";
        const updated = channel?.querySelector("lastBuildDate")?.textContent?.trim?.() ?? "";
        lastFeedMeta = { title: feedTitle, link: feedLink, updated };

        const items = Array.from(xml.querySelectorAll("item")).map(mapItem);

        // 중복 제거(guid 기준)
        const seen = new Set();
        const deduped = [];
        for (const it of items) {
          if (seen.has(it.guid)) continue;
          seen.add(it.guid);
          deduped.push(it);
        }
        return deduped;
      }

      async function loadCurrentFeed() {
        const selected = FEEDS.find((f) => f.key === elCategory.value) || FEEDS[0];
        const todayStr = new Date().toISOString().slice(0, 10);
        const dateStr = AUTO_END_DATE_BY_TODAY ? todayStr : (elDatePick.value || "").trim();
        if (AUTO_END_DATE_BY_TODAY && elDatePick && elDatePick.value !== todayStr) {
          elDatePick.value = todayStr;
        }
        hotWindowLabel = "";
        hotWeekMeta = null;
        hotSortBasis = "issue";
        cardBgShuffleSalt = Date.now();
        lastAiTimesCandidateItems = [];

        setStatus("warn", t("status_loading"), "status_loading");
        elGrid.innerHTML = `<div class="note" style="grid-column: 1 / -1;">${t("status_loading")}</div>`;

        try {
          log("load-feed", { cat: selected.key, date: dateStr });
          if (USE_BACKEND) {
            try {
              const weekly = await fetchWeeklyHotItems(selected.key, dateStr);
              lastFeedMeta = weekly.meta || { title: "", link: "", updated: "" };
              lastItems = weekly.items || [];
              hotWindowLabel = weekly.windowLabel || "";
              hotWeekMeta = weekly.weekMeta || null;
              hotSortBasis = weekly.sortBasis || "issue";
            } catch (backendErr) {
              log("backend-fallback", { error: String(backendErr?.message || backendErr) });
              let allItems = [];
              if (selected.key === "all_ai") {
                const sourceKeys = getSelectedAggregateSourceKeys();
                const settled = await Promise.allSettled(
                  sourceKeys.map(async (key) => {
                    const src = FEEDS.find((f) => f.key === key);
                    if (!src?.url) return [];
                    const parsed = await fetchSourceItemsWithParser(src);
                    return parsed.map((it) => ({ ...it, sourceFeed: key }));
                  }),
                );
                settled.forEach((r) => {
                  if (r.status === "fulfilled" && Array.isArray(r.value)) allItems.push(...r.value);
                });
              } else {
                allItems = await fetchSourceItemsWithParser(selected);
              }
              const bundle = buildHotBundleFromItems(allItems, dateStr);
              lastItems = bundle.items;
              hotSortBasis = bundle.sortBasis;
              hotWindowLabel = bundle.windowLabel;
              hotWeekMeta = bundle.weekMeta || null;
            }
          } else {
            let allItems = [];
            if (selected.key === "all_ai") {
              const sourceKeys = getSelectedAggregateSourceKeys();
              const settled = await Promise.allSettled(
                sourceKeys.map(async (key) => {
                  const src = FEEDS.find((f) => f.key === key);
                  if (!src?.url) return [];
                  const parsed = await fetchSourceItemsWithParser(src);
                  return parsed.map((it) => ({ ...it, sourceFeed: key }));
                }),
              );
              settled.forEach((r) => {
                if (r.status === "fulfilled" && Array.isArray(r.value)) allItems.push(...r.value);
              });
            } else {
              allItems = await fetchSourceItemsWithParser(selected);
            }
            const bundle = buildHotBundleFromItems(allItems, dateStr);
            lastItems = bundle.items;
            hotSortBasis = bundle.sortBasis;
            hotWindowLabel = bundle.windowLabel;
            hotWeekMeta = bundle.weekMeta || null;
          }
          if (lastItems.length) {
            lastItems.forEach((it) => ensureCanonicalCardText(it));
            await localizeItemsToEnglish(lastItems);
          }
          if (currentLang === "ko" && lastItems.length) {
            await localizeItemsToKorean(lastItems);
          }
          log("load-feed-done", { items: lastItems.length });
          setStatus("ok", t("status_done"), "status_done");
          setMetaText();
          render(lastItems);
        } catch (err) {
          console.error(err);
          log("load-feed-error", { error: String(err?.message || err) });
          setStatus("err", t("status_failed"), "status_failed");
          setMetaText();
          elGrid.innerHTML = `
            <div class="note" style="grid-column: 1 / -1;">
              <div style="font-weight:600; color: rgba(255,255,255,0.92);">${t("err_title")}</div>
              <div style="margin-top:6px;">${t("err_label")} <code>${escapeHtml(String(err?.message || err))}</code></div>
              <div style="margin-top:8px;">
                <ul style="margin: 0; padding-left: 18px;">
                  <li>${t("err_tip1")}</li>
                  <li>${t("err_tip2")}</li>
                  <li>${t("err_tip3")}</li>
                </ul>
              </div>
            </div>
          `;
        }
      }

      function init() {
        loadOgCacheFromStorage();
        loadKoTranslateCacheFromStorage();
        loadEnTranslateCacheFromStorage();
        loadActiveSourcesFromStorage();
        applyI18n();
        // Options
        elCategory.innerHTML = FEEDS.map((f) => `<option value="${f.key}">${f.label}</option>`).join("");
        elCategory.value = "all_ai";
        elDatePick.value = new Date().toISOString().slice(0, 10);
        elQ.value = "";
        renderSourceToggles();

        elCategory.addEventListener("change", () => {
          renderSourceToggles();
          setMetaText();
          loadCurrentFeed();
        });
        elDatePick.addEventListener("change", loadCurrentFeed);
        elReload.addEventListener("click", loadCurrentFeed);
        elQ.addEventListener("input", () => render(lastItems));
        elSourceToggles?.addEventListener("click", (e) => {
          const btn = e.target && e.target.closest ? e.target.closest(".sourceChip") : null;
          if (!btn) return;
          const key = btn.getAttribute("data-source-key") || "";
          if (!AGGREGATE_SOURCE_KEYS.includes(key)) return;

          const next = new Set(activeAggregateSourceKeys);
          if (next.has(key)) {
            if (next.size === 1) return;
            next.delete(key);
          } else {
            next.add(key);
          }

          activeAggregateSourceKeys = next;
          saveActiveSourcesToStorage();
          renderSourceToggles();
          setMetaText();
          loadCurrentFeed();
        });
        elLangToggle?.addEventListener("click", async () => {
          const prevStatus = { ...lastStatus };
          currentLang = currentLang === "ko" ? "en" : "ko";
          try {
            localStorage.setItem("lang", currentLang);
          } catch (e) {}
          applyI18n();
          renderSourceToggles();
          setMetaText();
          if (lastItems.length) {
            lastItems.forEach((it) => ensureCanonicalCardText(it));
          }
          if (currentLang === "en" && lastItems.length) {
            setStatus("warn", t("status_loading"), "status_loading");
            await localizeItemsToEnglish(lastItems);
          }
          if (currentLang === "ko" && lastItems.length) {
            setStatus("warn", t("status_loading"), "status_loading");
            await localizeItemsToKorean(lastItems);
          }
          setStatus(prevStatus.kind, t(prevStatus.key), prevStatus.key);
          render(lastItems);
        });
        elGrid.addEventListener(
          "click",
          (e) => {
            const btn = e.target && e.target.closest ? e.target.closest(".navBtn") : null;
            if (!btn) return;
            if (btn.id === "navPrev") {
              if (navHandlers.prev) navHandlers.prev();
              else log("nav-miss", { dir: "prev" });
            } else if (btn.id === "navNext") {
              if (navHandlers.next) navHandlers.next();
              else log("nav-miss", { dir: "next" });
            }
          },
          true,
        );

        setStatus("", t("status_idle"), "status_idle");
        setMetaText();
        loadCurrentFeed();
      }

init();
    </script>
