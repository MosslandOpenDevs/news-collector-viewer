<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WEEKLY AI HOT 15 - Medium Layout</title>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: #121625;
        --card: #151a2b;
        --text: #e8ecff;
        --muted: #a8b1d9;
        --border: rgba(255, 255, 255, 0.1);
        --accent: #35c5f0;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        --radius: 16px;
        --radius-sm: 12px;
        --glass: rgba(255, 255, 255, 0.08);
        --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Noto Sans KR",
          Arial,
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          sans-serif;
        background:
          radial-gradient(1200px 700px at 30% -10%, rgba(53, 197, 240, 0.18), transparent 55%),
          radial-gradient(900px 500px at 90% 10%, rgba(124, 92, 255, 0.12), transparent 55%), var(--bg);
        color: var(--text);
        line-height: 1.45;
      }

      header {
        padding: 20px 16px 8px;
        max-width: 640px;
        margin: 0 auto;
      }

      .title {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: -0.2px;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 10px 16px 30px;
      }

      .panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 14px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: center;
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      select,
      input {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.18);
        color: var(--text);
        outline: none;
      }

      select:focus,
      input:focus {
        border-color: rgba(53, 197, 240, 0.55);
        box-shadow: 0 0 0 4px rgba(53, 197, 240, 0.12);
      }

      button {
        padding: 11px 14px;
        border-radius: 12px;
        border: 1px solid rgba(53, 197, 240, 0.35);
        background: rgba(53, 197, 240, 0.15);
        color: var(--text);
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 120ms ease;
        white-space: nowrap;
      }

      button:hover {
        background: rgba(53, 197, 240, 0.22);
      }

      button:active {
        transform: translateY(1px);
      }

      .metaRow {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-top: 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.25);
      }

      .dot.ok {
        background: rgba(38, 208, 124, 0.85);
      }
      .dot.warn {
        background: rgba(255, 196, 46, 0.9);
      }
      .dot.err {
        background: rgba(255, 78, 78, 0.9);
      }

      .stage {
        margin-top: 16px;
        position: relative;
        border-radius: 26px;
        overflow: hidden;
        min-height: 62vh;
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: var(--shadow-strong);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
      }

      .stageBg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        filter: saturate(1.05);
        transform: scale(1.02);
        pointer-events: none;
      }

      .stageBg.loading {
        background-image:
          linear-gradient(110deg, rgba(255, 255, 255, 0.08) 8%, rgba(255, 255, 255, 0.18) 18%, rgba(255, 255, 255, 0.08) 33%),
          linear-gradient(180deg, rgba(20, 24, 38, 0.9), rgba(10, 12, 20, 0.9));
        background-size:
          200% 100%,
          100% 100%;
        animation: shimmer 1.2s ease-in-out infinite;
      }

      .stageBg.ready {
        animation: none;
      }

      .stageBg.noimage {
        background-image:
          radial-gradient(180px 180px at 20% 10%, rgba(53, 197, 240, 0.15), transparent 60%),
          radial-gradient(260px 260px at 90% 20%, rgba(124, 92, 255, 0.18), transparent 60%),
          linear-gradient(180deg, rgba(10, 12, 20, 0.9), rgba(7, 9, 16, 0.98));
        animation: none;
      }

      @keyframes shimmer {
        0% {
          background-position:
            200% 0,
            0 0;
        }
        100% {
          background-position:
            -200% 0,
            0 0;
        }
      }

      .stageShade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(8, 10, 16, 0.05) 0%, rgba(8, 10, 16, 0.35) 50%, rgba(8, 10, 16, 0.78) 100%);
        pointer-events: none;
      }

      .stageContent {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-rows: 1fr auto;
        min-height: 62vh;
        padding: 18px;
      }

      .chipRow {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .pill {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.2);
        color: rgba(255, 255, 255, 0.88);
        font-size: 12px;
        backdrop-filter: blur(6px);
      }

      .headline {
        margin: 10px 0 0;
        font-size: 22px;
        letter-spacing: -0.4px;
        line-height: 1.25;
      }

      .headline a {
        color: #ffffff;
        text-decoration: none;
      }

      .headline a:hover {
        text-decoration: underline;
        text-decoration-color: rgba(255, 255, 255, 0.65);
      }

      .byline {
        margin-top: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.75);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .desc {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        display: block;
        overflow: visible;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 12px;
        margin-top: 10px;
      }

      .footer a {
        color: #ffffff;
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .pageFooter {
        margin: 18px auto 0;
        padding: 14px 16px 18px;
        max-width: 640px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 12px;
        line-height: 1.6;
      }

      .pageFooterMeta {
        display: grid;
        gap: 6px;
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
      }

      .noImageBadge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.45);
        color: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 12px;
        margin-top: 10px;
        backdrop-filter: blur(6px);
      }

      .navBtn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 3;
        width: 42px;
        height: 42px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(0, 0, 0, 0.35);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 20px;
        cursor: pointer;
        backdrop-filter: blur(6px);
        touch-action: manipulation;
      }

      .navBtn:hover {
        background: rgba(0, 0, 0, 0.5);
      }
      .navPrev {
        left: 12px;
      }
      .navNext {
        right: 12px;
      }

      .counter {
        position: absolute;
        right: 12px;
        top: 12px;
        z-index: 3;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.35);
        color: rgba(255, 255, 255, 0.9);
        font-size: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(6px);
      }

      .stage.hotList {
        min-height: 72vh;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .hotHeader {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 10px;
        padding: 4px 2px 0;
      }

      .hotTitle {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: -0.25px;
      }

      .hotSub {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .hotScroller {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-snap-type: y proximity;
      }

      .hotCard {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        gap: 12px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
        scroll-snap-align: start;
      }

      .hotThumb {
        position: relative;
        min-height: 132px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background-size: cover;
        background-position: center;
      }

      .hotThumbFallback {
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.82);
        font-size: 12px;
        background:
          radial-gradient(190px 120px at 0% 0%, rgba(53, 197, 240, 0.26), transparent 70%),
          linear-gradient(150deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03));
      }

      .hotRank {
        position: absolute;
        left: 8px;
        top: 8px;
        z-index: 2;
        padding: 5px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.26);
      }

      .hotBody {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .hotHeadline {
        margin: 0;
        font-size: 16px;
        line-height: 1.33;
        letter-spacing: -0.2px;
      }

      .hotHeadline a {
        color: #fff;
        text-decoration: none;
      }

      .hotHeadline a:hover {
        text-decoration: underline;
        text-decoration-color: rgba(255, 255, 255, 0.68);
      }

      .hotMeta {
        margin-top: 7px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: rgba(255, 255, 255, 0.74);
        font-size: 12px;
      }

      .hotMetric {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.3);
        color: rgba(255, 255, 255, 0.9);
      }

      .hotDesc {
        margin: 7px 0 0;
        color: rgba(255, 255, 255, 0.88);
        font-size: 13px;
        display: block;
        overflow: visible;
      }

      .hotCats {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .hotCard .pill {
        font-size: 11px;
        padding: 4px 8px;
      }

      @media (max-width: 700px) {
        .hotCard {
          grid-template-columns: 148px minmax(0, 1fr);
          gap: 10px;
        }
        .hotThumb {
          min-height: 110px;
        }
        .hotHeadline {
          font-size: 15px;
        }
      }

      .note {
        margin-top: 14px;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        color: var(--muted);
        font-size: 12px;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
        color: rgba(232, 236, 255, 0.9);
      }

      /* Trend UI overrides */
      @import url("https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap");

      body {
        font-family: "Sora", "Noto Sans KR", "Segoe UI", sans-serif;
        background:
          radial-gradient(900px 500px at 0% 0%, rgba(253, 181, 102, 0.24), transparent 68%),
          radial-gradient(720px 460px at 100% 0%, rgba(60, 181, 205, 0.2), transparent 66%),
          linear-gradient(180deg, #f3f0e9 0%, #f7f6f4 100%);
        color: #1d2128;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image: radial-gradient(rgba(14, 22, 36, 0.06) 1px, transparent 1px);
        background-size: 22px 22px;
        opacity: 0.18;
      }

      body::after {
        background:
          radial-gradient(380px 200px at 8% 18%, rgba(255, 177, 100, 0.24), transparent 70%),
          radial-gradient(320px 180px at 92% 22%, rgba(67, 157, 210, 0.2), transparent 72%);
        animation: auraShift 12s ease-in-out infinite alternate;
      }

      @keyframes auraShift {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        100% {
          transform: translate3d(0, -14px, 0) scale(1.05);
        }
      }

      .blogShell {
        width: min(1060px, 92vw);
        margin: 28px auto 50px;
        position: relative;
        z-index: 1;
      }

      .heroSection {
        max-width: none;
        margin: 0;
        padding: 0;
      }

      .heroThumb {
        position: relative;
        border-radius: 28px;
        overflow: hidden;
        min-height: 320px;
        border: 1px solid rgba(19, 20, 24, 0.2);
        background:
          radial-gradient(760px 360px at -6% -8%, rgba(255, 178, 109, 0.58), transparent 66%),
          radial-gradient(760px 380px at 102% 120%, rgba(88, 188, 210, 0.38), transparent 70%),
          linear-gradient(130deg, #171a22 0%, #2a2f39 45%, #1d2f43 100%);
        box-shadow:
          0 30px 70px rgba(18, 27, 45, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        animation: heroIntro 700ms cubic-bezier(0.2, 0.9, 0.18, 1) both;
      }

      @keyframes heroIntro {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .heroThumb::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid rgba(255, 255, 255, 0.24);
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .heroShade {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(120deg, rgba(0, 0, 0, 0.62) 8%, rgba(0, 0, 0, 0.18) 54%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.45));
      }

      .heroContent {
        position: relative;
        z-index: 1;
        padding: 30px 34px;
        color: #fff;
      }

      .heroKicker {
        margin: 0;
        letter-spacing: 1.3px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        opacity: 0.92;
      }

      .heroContent h1 {
        margin: 11px 0 0;
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(40px, 6vw, 76px);
        line-height: 0.92;
        letter-spacing: -1.3px;
      }

      .heroDesc {
        margin: 16px 0 0;
        max-width: 560px;
        font-size: 15px;
        color: rgba(255, 255, 255, 0.92);
      }

      .heroPills {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .heroPill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 12px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.34);
        background: rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(8px);
      }

      .blogMain {
        max-width: none;
        padding: 18px 0 0;
      }

      .blogPanel {
        padding: 0;
        border: 0;
        box-shadow: none;
        background: transparent;
      }

      .metaLine {
        margin: 0 0 12px;
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 12px;
        color: #4f5662;
        border: 1px solid rgba(24, 31, 45, 0.11);
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(8px);
      }

      .srOnlyControls {
        display: none;
      }

      .stage {
        border: 0;
        border-radius: 0;
        overflow: visible;
        min-height: auto;
        box-shadow: none;
        background: transparent;
      }

      .stage.hotList {
        min-height: auto;
        padding: 0;
        gap: 12px;
      }

      .hotHeader {
        align-items: center;
        margin-bottom: 2px;
      }

      .hotTitle {
        color: #1a1f28;
        font-family: "Fraunces", Georgia, serif;
        font-size: 27px;
        letter-spacing: -0.4px;
      }

      .hotSub {
        color: #646d7b;
        font-size: 13px;
      }

      .hotScroller {
        overflow: visible;
        min-height: auto;
        max-height: none;
        scroll-snap-type: none;
        gap: 14px;
      }

      .hotCard {
        grid-template-columns: 274px minmax(0, 1fr);
        border-radius: 18px;
        border: 1px solid rgba(24, 31, 45, 0.13);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.8)),
          linear-gradient(120deg, rgba(250, 252, 255, 0.75), rgba(253, 247, 240, 0.8));
        box-shadow:
          0 18px 42px rgba(21, 26, 38, 0.08),
          0 3px 10px rgba(21, 26, 38, 0.06);
        padding: 12px;
        transition:
          transform 220ms ease,
          box-shadow 220ms ease,
          border-color 220ms ease;
        opacity: 0;
        transform: translateY(12px);
        animation: cardRise 540ms cubic-bezier(0.19, 0.9, 0.25, 1) both;
        animation-delay: var(--delay, 0ms);
      }

      .hotCard:hover {
        transform: translateY(-3px);
        border-color: rgba(39, 97, 158, 0.34);
        box-shadow:
          0 24px 46px rgba(21, 28, 42, 0.14),
          0 6px 16px rgba(21, 28, 42, 0.1);
      }

      @keyframes cardRise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hotThumb {
        border: 1px solid rgba(28, 34, 43, 0.09);
        border-radius: 12px;
        min-height: 164px;
      }

      .hotThumb::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.26));
      }

      .hotThumbFallback {
        color: #3d4450;
        background:
          radial-gradient(200px 120px at 0% 0%, rgba(255, 186, 122, 0.4), transparent 75%),
          linear-gradient(150deg, rgba(197, 220, 247, 0.7), rgba(245, 246, 248, 0.9));
      }

      .hotRank {
        background: rgba(10, 16, 28, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .hotBody {
        padding-right: 4px;
      }

      .hotHeadline a,
      .hotHeadline {
        color: #1f2430;
      }

      .hotHeadline a:hover {
        text-decoration-thickness: 2px;
        text-decoration-color: rgba(46, 101, 158, 0.44);
      }

      .hotMeta {
        color: #606978;
      }

      .hotMetric {
        color: #194967;
        background: linear-gradient(90deg, #eaf7ff, #eef7ec);
        border-color: rgba(63, 146, 177, 0.34);
      }

      .hotDesc {
        color: #3f4958;
      }

      .pill {
        border-color: rgba(24, 31, 45, 0.15);
        background: #f2f5fa;
        color: #4c5668;
      }

      @media (max-width: 900px) {
        .blogShell {
          width: min(95vw, 1060px);
        }

        .heroThumb {
          min-height: 270px;
        }

        .heroContent {
          padding: 24px 22px;
        }

        .heroContent h1 {
          font-size: clamp(34px, 12vw, 62px);
        }

        .hotCard {
          grid-template-columns: 1fr;
        }

        .hotThumb {
          min-height: 188px;
        }
      }

      /* Neo Magazine refresh */
      body {
        font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(77, 226, 255, 0.2), transparent 60%),

        const text = decodeHtmlEntitiesText(value || "").replace(/\s+/g, " ").trim();

        const letters = (text.match(/[A-Za-z]/g) || []).length;
        if (letters < Math.max(1, minLetters)) return false;
        const compactLen = text.replace(/\s+/g, "").length || 1;

          entries.forEach(([k, v]) => {
            obj[k] = v;
          });
          localStorage.setItem(EN_TRANSLATE_CACHE_KEY, JSON.stringify(obj));
        } catch (e) {}
      }

      async function fetchWithTimeout(url, options = {}, timeoutMs = NETWORK_FETCH_TIMEOUT_MS) {
        const controller = new AbortController();
        const safeTimeout = Math.max(1000, Number(timeoutMs) || NETWORK_FETCH_TIMEOUT_MS);
        const timer = setTimeout(() => controller.abort(), safeTimeout);
        try {
          const nextOptions = { ...(options || {}), signal: controller.signal };
          return await fetch(url, nextOptions);
        } finally {
          clearTimeout(timer);
        }
      }

      async function translateTextViaPublicGoogle(text, from = "auto", to = "ko") {
        const q = decodeHtmlEntitiesText(text || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!q) return "";
        const params = new URLSearchParams({
          client: "gtx",
          sl: from || "auto",
          tl: to || "ko",
          dt: "t",
          q,
        });
        const url = `https://translate.googleapis.com/translate_a/single?${params.toString()}`;
        const res = await fetchWithTimeout(url, { method: "GET", cache: "no-store" }, TRANSLATE_FETCH_TIMEOUT_MS);
        if (!res.ok) throw new Error(`PUBLIC_TRANSLATE_HTTP_${res.status}`);
        const json = await res.json();
        if (!Array.isArray(json) || !Array.isArray(json[0])) return "";
        const translated = json[0]
          .map((part) => (Array.isArray(part) && typeof part[0] === "string" ? part[0] : ""))
          .join("")
          .trim();
        return decodeHtmlEntitiesText(translated || "");
      }

      async function translateTextToKo(text, kind) {
        const safeKind = kind === "title" ? "title" : "summary";
        const normalized = decodeHtmlEntitiesText(text)
          .replace(/\s+/g, " ")
          .trim();
        if (!normalized) return "";
        const clipped = normalized.slice(0, KO_TRANSLATE_MAX_TEXT);
        if (/[가-힣]/.test(clipped) && !/[A-Za-z]/.test(clipped)) return clipped;
        const from = /[A-Za-z]/.test(clipped) ? "en" : "auto";

        const cacheKey = makeKoTranslateCacheKey(clipped, safeKind);
        const cached = koTranslateCache.get(cacheKey);
        if (cached && cached !== clipped) {
          const hasHangul = /[가-힣]/.test(cached);
          if (hasHangul) return cached;
        }

        try {
          const params = new URLSearchParams({
            text: clipped,
            to: "ko",
            from,
            kind: safeKind,
          });
          const res = await fetchWithTimeout(
            `${BACKEND_TRANSLATE_API}?${params.toString()}`,
            { method: "GET", cache: "no-store" },
            TRANSLATE_FETCH_TIMEOUT_MS,
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const translated = decodeHtmlEntitiesText(json?.translated || clipped) || clipped;
          koTranslateCache.set(cacheKey, translated);
          return translated;
        } catch (e) {
          try {
            const translatedPublic = await translateTextViaPublicGoogle(clipped, from, "ko");
            if (translatedPublic && translatedPublic !== clipped) {
              koTranslateCache.set(cacheKey, translatedPublic);
              return translatedPublic;
            }
          } catch (_fallbackErr) {}
          return clipped;
        }
      }

      async function translateTextToEn(text, kind) {
        const safeKind = kind === "title" ? "title" : "summary";
        const normalized = decodeHtmlEntitiesText(text)
          .replace(/\s+/g, " ")
          .trim();
        if (!normalized) return "";
        const clipped = normalized.slice(0, KO_TRANSLATE_MAX_TEXT);
        if (/[A-Za-z]/.test(clipped) && !/[가-힣]/.test(clipped)) return clipped;
        const from = /[가-힣]/.test(clipped) ? "ko" : "auto";

        const cacheKey = makeEnTranslateCacheKey(clipped, safeKind);
        const cached = enTranslateCache.get(cacheKey);
        if (cached && isReliableEnglishText(cached, safeKind === "title" ? 3 : 12)) return cached;

        try {
          const params = new URLSearchParams({
            text: clipped,
            to: "en",
            from,
            kind: safeKind,
          });
          const res = await fetchWithTimeout(
            `${BACKEND_TRANSLATE_API}?${params.toString()}`,
            { method: "GET", cache: "no-store" },
            TRANSLATE_FETCH_TIMEOUT_MS,
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          const translated = decodeHtmlEntitiesText(json?.translated || clipped) || clipped;
          if (isReliableEnglishText(translated, safeKind === "title" ? 3 : 12)) {
            enTranslateCache.set(cacheKey, translated);
            return translated;
          }
        } catch (e) {}

        try {
          const translatedPublic = await translateTextViaPublicGoogle(clipped, from, "en");
          if (isReliableEnglishText(translatedPublic, safeKind === "title" ? 3 : 12)) {
            enTranslateCache.set(cacheKey, translatedPublic);
            return translatedPublic;
          }
        } catch (e) {}
        return clipped;
      }

      function localizeCategoryLabel(label, lang = currentLang) {
        const raw = decodeHtmlEntitiesText(label || "").replace(/\s+/g, " ").trim();
        if (!raw) return "";
        if (lang !== "en") return raw;
        if (KO_CATEGORY_TO_EN[raw]) return KO_CATEGORY_TO_EN[raw];
        const compact = raw.replace(/\s+/g, "").replace(/[·•]/g, "");
        if (KO_CATEGORY_TO_EN[compact]) return KO_CATEGORY_TO_EN[compact];
        if (!/[가-힣]/.test(raw)) return raw;
        const replaced = raw
          .replace(/AI산업일반/gi, "AI Industry")
          .replace(/인공지능산업일반/gi, "AI Industry")
          .replace(/산업일반/gi, "AI Industry")
          .replace(/인공지능산업/gi, "AI Industry")
          .replace(/인공지능/gi, "Artificial Intelligence")
          .replace(/산업/gi, "Industry")
          .replace(/기술/gi, "Technology")
          .replace(/정책/gi, "Policy")
          .replace(/규제/gi, "Regulation")
          .replace(/기업/gi, "Company")
          .replace(/스타트업/gi, "Startup")
          .replace(/제품/gi, "Product")

          .replace(/발표/gi, "Announcement")

      function toSafeEnglishLabel(raw, fallback = "AI Industry") {
        const base = decodeHtmlEntitiesText(raw || "").replace(/\s+/g, " ").trim();
        if (!base) return fallback;
        const localized = localizeCategoryLabel(base, "en");
        const cleaned = decodeHtmlEntitiesText(localized || "")
          .replace(/[가-힣]+/g, " ")
          .replace(/[_|/]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        if (!cleaned) return fallback;
        return cleaned;

      function escapeHtml(s) {
        return (s ?? "").replace(
          /[&<>"]/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
            })[c],
        );
      }

      function stripHtml(html) {
        const div = document.createElement("div");
        div.innerHTML = html || "";
        return (div.textContent || "").trim();
      }

      function firstImageUrlFromHtml(html) {
        if (!html) return "";
        // 단순 img src/data-src/srcset 추출
        const src = html.match(/<img[^>]+src=["']([^"']+)["']/i);
        if (src && src[1]) return src[1];
        const dataSrc = html.match(/<img[^>]+data-src=["']([^"']+)["']/i);
        if (dataSrc && dataSrc[1]) return dataSrc[1];
        const dataOrig = html.match(/<img[^>]+data-original=["']([^"']+)["']/i);
        if (dataOrig && dataOrig[1]) return dataOrig[1];
        const srcset = html.match(/<img[^>]+srcset=["']([^"']+)["']/i);
        if (srcset && srcset[1]) {
          const first = srcset[1].split(",")[0]?.trim()?.split(" ")[0];
          if (first) return first;
        }
        return "";
      }

      function normalizeImageUrl(url) {
        if (!url) return "";
        let u = url.trim();
        if (u.startsWith("//")) u = "https:" + u;
        if (!/^https?:\/\//i.test(u)) return "";
        return u;
      }

      function buildPexelsPhotoUrl(photoId, width = 1800, height = 1100) {
        const id = String(photoId || "").replace(/[^\d]/g, "");
        if (!id) return "";
        return `https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=${width}&h=${height}&fit=crop`;
      }

      function buildImageUrl(rawUrl, quality) {
        if (!rawUrl) return "";
        const base =
          quality === "low"
            ? `${IMG_PROXY}${encodeURIComponent(rawUrl)}&w=${IMG_LOW_W}&q=${IMG_QUALITY_LOW}&fit=cover`
            : `${IMG_PROXY}${encodeURIComponent(rawUrl)}&w=${IMG_HIGH_W}&q=${IMG_QUALITY_HIGH}&fit=cover`;
        return base;
      }

      function shouldLoadHighRes() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (!conn || !conn.effectiveType) return true;
        const type = conn.effectiveType;
        return type === "4g";
      }

      async function fetchTextWithProxyRetry(url, timeoutMs = 12000) {
        const attempts = [];
        for (const makeProxyUrl of CORS_PROXIES) {
          const target = makeProxyUrl(url);
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), timeoutMs);
          try {
            const res = await fetch(target, { method: "GET", cache: "no-store", signal: controller.signal });
            clearTimeout(timer);
            if (!res.ok) {
              attempts.push(`${res.status} ${target}`);
              continue;
            }
            if (target.includes("/get?url=")) {
              const j = await res.json();
              const body = j?.contents || "";
              if (body) return body;
              attempts.push(`empty-body ${target}`);
              continue;
            }
            return await res.text();
          } catch (e) {
            clearTimeout(timer);
            attempts.push(`${String(e?.message || e)} ${target}`);
          }
        }
        throw new Error(`proxy_fetch_failed: ${attempts.slice(0, 3).join(" | ") || "unknown"}`);
      }

      function setStageBg(bgEl, url) {
        if (!bgEl || !url) return;
        bgEl.style.backgroundImage = `url('${url}')`;
      }

      function upgradeStageBg(bgEl, rawUrl) {
        if (!bgEl || !rawUrl) return;
        setStageBg(bgEl, buildImageUrl(rawUrl, "low"));
        if (shouldLoadHighRes()) {
          preloadImage(buildImageUrl(rawUrl, "high")).then(() => {
            setStageBg(bgEl, buildImageUrl(rawUrl, "high"));
          });
        }
      }

      async function fetchOgImageUrl(pageUrl) {
        if (!pageUrl) return "";
        if (ogImageCache.has(pageUrl)) {
          const cached = ogImageCache.get(pageUrl) || "";
          if (cached) return cached;
        }
        try {
          const html = await fetchTextWithProxyRetry(pageUrl);
          const m =
            html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i) ||
            html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
          const url = m && m[1] ? normalizeImageUrl(m[1]) : "";
          ogImageCache.set(pageUrl, url);
          saveOgCacheToStorage();
          return url;
        } catch (e) {
          ogImageCache.delete(pageUrl);
          return "";
        }
      }

      function preloadImage(url) {
        if (!url) return Promise.resolve(false);
        if (imagePreloadCache.get(url) === "done") return Promise.resolve(true);
        if (imagePreloadCache.get(url) === "loading") return Promise.resolve(false);
        imagePreloadCache.set(url, "loading");
        const load = (u, triedAlt) =>
          new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              imagePreloadCache.set(url, "done");
              resolve(true);
            };
            img.onerror = () => {
              if (!triedAlt && u.includes(IMG_PROXY)) {
                const altUrl = u.replace(IMG_PROXY, IMG_PROXY_ALT);
                load(altUrl, true).then(resolve);
                return;
              }
              imagePreloadCache.set(url, "error");
              resolve(false);
            };
            img.src = u;
          });
        return load(url, false);
      }

      async function ensureImageForItem(item) {
        if (!item) return "";
        if (item.imgUrl) {
          const lowOk = await preloadImage(buildImageUrl(item.imgUrl, "low"));
          let highOk = true;
          if (shouldLoadHighRes()) {
            highOk = await preloadImage(buildImageUrl(item.imgUrl, "high"));
          }
          if (lowOk || highOk) return item.imgUrl;
          item.imgUrl = "";
        }
        if (!item.link) return "";
        const ogUrl = await fetchOgImageUrl(item.link);
        if (ogUrl) {
          item.imgUrl = ogUrl;
          const lowOk = await preloadImage(buildImageUrl(ogUrl, "low"));
          let highOk = true;
          if (shouldLoadHighRes()) {
            highOk = await preloadImage(buildImageUrl(ogUrl, "high"));
          }
          if (lowOk || highOk) return ogUrl;
          item.imgUrl = "";
        }
        return "";
      }

      async function preloadAllImagesInOrder(items, startIndex) {
        if (!items.length) return;
        if (preloadQueueRunning) return;
        preloadQueueRunning = true;
        const total = items.length;
        let cursor = startIndex;
        let inFlight = 0;

        const nextIndex = () => {
          const idx = cursor;
          cursor = (cursor + 1) % total;
          return idx;
        };

        const runOne = async () => {
          const idx = nextIndex();
          const item = items[idx];
          await ensureImageForItem(item);
        };

        const runners = [];
        for (let i = 0; i < Math.min(IMG_PRELOAD_CONCURRENCY, total); i++) {
          runners.push(
            (async function loop() {
              while (true) {
                await runOne();
                if (cursor === startIndex) break;
              }
            })(),
          );
        }

        await Promise.all(runners);
        preloadQueueRunning = false;
      }

      function hydrateMissingImages(filteredItems, sourceItems) {
        if (imageRefreshPending) return;
        const targets = (filteredItems || []).filter((it) => !it.imgUrl && it.link).slice(0, OG_FETCH_LIMIT);
        if (!targets.length) return;
        imageRefreshPending = true;
        Promise.allSettled(targets.map((it) => ensureImageForItem(it)))
          .then(() => {
            const hasFilled = targets.some((it) => !!it.imgUrl);
            if (hasFilled) render(sourceItems);
          })
          .finally(() => {
            imageRefreshPending = false;
          });
      }

      function textFromNode(parent, selector) {
        const n = parent.querySelector(selector);
        return n?.textContent?.trim?.() ?? "";
      }

      function attrFromNode(parent, selector, attr) {
        const n = parent.querySelector(selector);
        return n?.getAttribute?.(attr) ?? "";
      }

      function mapItem(itemEl) {
        const title = textFromNode(itemEl, "title") || "(No title)";
        const link = textFromNode(itemEl, "link");
        const guid = textFromNode(itemEl, "guid") || link || title;
        const pubDate = textFromNode(itemEl, "pubDate");

        // author: dc:creator / author
        const creator = textFromNode(itemEl, "dc\\:creator") || textFromNode(itemEl, "creator") || textFromNode(itemEl, "author");

        // categories
        const categories = Array.from(itemEl.querySelectorAll("category"))
          .map((x) => x.textContent.trim())
          .filter(Boolean);

        // description / content
        const descHtml = textFromNode(itemEl, "description");
        const contentHtml = textFromNode(itemEl, "content\\:encoded");
        const summaryHtml = contentHtml || descHtml;
        const summaryText = stripHtml(summaryHtml);

        // image
        // RSS 사례: enclosure / media:content / media:thumbnail / img in html
        const enclosureUrl = attrFromNode(itemEl, "enclosure", "url");
        const mediaUrl = attrFromNode(itemEl, "media\\:content", "url") || attrFromNode(itemEl, "media\\:thumbnail", "url");
        const imgUrl = mediaUrl || enclosureUrl || firstImageUrlFromHtml(summaryHtml);

        return { title, link, guid, pubDate, creator, categories, summaryText, imgUrl: normalizeImageUrl(imgUrl) };
      }

      function utcDateKey(date) {
        if (!(date instanceof Date) || Number.isNaN(date.valueOf())) return "";
        return date.toISOString().slice(0, 10);
      }

      function parseDateInputToUtc(dateStr) {
        const raw = (dateStr || "").trim();
        if (!raw) return new Date();
        const parsed = new Date(`${raw}T00:00:00Z`);
        return Number.isNaN(parsed.valueOf()) ? new Date() : parsed;
      }

      function getWeekOfMonthUtc(date) {
        const d = date instanceof Date ? date : new Date(date || Date.now());
        // Month week as simple day buckets: 1-7, 8-14, 15-21, 22-28, 29-31.
        return Math.ceil(d.getUTCDate() / 7);
      }

      function buildMonthWeekMeta(date) {
        const d = date instanceof Date ? date : new Date(date || Date.now());
        return {
          year: d.getUTCFullYear(),
          month: d.getUTCMonth() + 1,
          week: getWeekOfMonthUtc(d),
        };
      }

      function formatMonthWeekLabel(meta) {
        if (!meta) return "";
        if (currentLang === "ko") return `${meta.year}년 ${meta.month}월 ${meta.week}주차`;
        return `${meta.year}-${String(meta.month).padStart(2, "0")} Week ${meta.week}`;
      }

      function buildWindowDates(endDate, days) {
        const d = endDate instanceof Date ? endDate : new Date();
        const baseUtc = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
        const out = [];
        for (let i = 0; i < days; i++) {
          out.push(utcDateKey(new Date(baseUtc - i * 24 * 60 * 60 * 1000)));
        }
        return out;
      }

      function toMetricNumber(value) {
        if (typeof value === "number" && Number.isFinite(value)) return value;
        if (typeof value === "string") {
          const n = Number(value.replace(/[^\d.-]/g, ""));
          return Number.isFinite(n) ? n : null;
        }
        return null;
      }

      function getMetricByAliases(item, aliases) {
        if (!item || typeof item !== "object") return null;
        const aliasSet = new Set((aliases || []).map((k) => String(k).toLowerCase()));
        const containers = [item, item.metrics, item.stats, item.engagement, item.social, item.meta];
        for (const obj of containers) {
          if (!obj || typeof obj !== "object") continue;
          for (const alias of aliases || []) {
            const direct = toMetricNumber(obj[alias]);
            if (direct !== null) return direct;
          }
          for (const [k, v] of Object.entries(obj)) {
            if (!aliasSet.has(String(k).toLowerCase())) continue;
            const n = toMetricNumber(v);
            if (n !== null) return n;
          }
        }
        return null;
      }

      function getItemViewCount(item) {
        return getMetricByAliases(item, ["viewCount", "views", "hits", "readCount", "impressions", "popularity", "score"]);
      }

      function getItemLikeCount(item) {
        return getMetricByAliases(item, ["likes", "likeCount", "hearts", "applause", "applauds", "claps", "upvotes"]);
      }

      function getItemCommentCount(item) {
        return getMetricByAliases(item, ["comments", "commentCount", "replies", "replyCount"]);
      }

      function getItemShareCount(item) {
        return getMetricByAliases(item, ["shares", "shareCount", "reposts", "repostCount", "retweets"]);
      }

      function buildIssueTokens(item) {
        const raw = `${item?.title || ""} ${item?.summaryText || ""} ${((item?.categories || []).join(" ") || "").toLowerCase()}`.toLowerCase();
        const normalized = raw.replace(/[^0-9a-zA-Z\u00C0-\u024F\uAC00-\uD7A3]+/g, " ");
        const tokens = normalized
          .split(/\s+/)
          .filter((tok) => tok.length >= ISSUE_TOKEN_MIN_LEN && !ISSUE_STOPWORDS.has(tok));
        return Array.from(new Set(tokens)).slice(0, 18);
      }

      function buildIssueTokenFrequency(items) {
        const freq = new Map();
        for (const it of items || []) {
          const tokens = buildIssueTokens(it);
          tokens.forEach((tok) => {
            freq.set(tok, (freq.get(tok) || 0) + 1);
          });
        }
        return freq;
      }

      function getEngagementScore(item) {
        const views = getItemViewCount(item) || 0;
        const likes = getItemLikeCount(item) || 0;
        const comments = getItemCommentCount(item) || 0;
        const shares = getItemShareCount(item) || 0;
        const v = views > 0 ? Math.log10(views + 1) * 100 : 0;
        const l = likes > 0 ? Math.log10(likes + 1) * 78 : 0;
        const c = comments > 0 ? Math.log10(comments + 1) * 88 : 0;
        const s = shares > 0 ? Math.log10(shares + 1) * 92 : 0;
        return v + l + c + s;
      }

      function getIssueFrequencyScore(item, tokenFreq) {
        const tokens = buildIssueTokens(item);
        if (!tokens.length) return 0;
        let score = 0;
        for (const tok of tokens) {
          const f = tokenFreq.get(tok) || 0;
          if (f > 1) score += (f - 1) * 9;
        }
        const categoryBoost = Math.min(8, (item?.categories || []).length * 1.2);
        return score + categoryBoost;
      }

      function countKeywordHits(text, keywords) {
        const t = String(text || "");
        if (!t) return 0;
        let hits = 0;
        for (const kw of keywords || []) {
          const token = String(kw || "").trim().toLowerCase();
          if (!token) continue;
          const normalizedText = t.toLowerCase();
          if (/[^\x00-\x7F]/.test(token)) {
            if (normalizedText.includes(token)) hits++;
            continue;
          }
          if (kw.includes(" ")) {
            if (t.includes(kw)) hits++;
            continue;
          }
          const re = new RegExp(`\\b${kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")}\\b`, "i");
          if (re.test(t)) hits++;
        }
        return hits;
      }

      function getProductTechBoost(item) {
        const text = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        if (!text) return 0;
        const productHits = countKeywordHits(text, PRODUCT_NEWS_KEYWORDS);
        const techHits = countKeywordHits(text, TECH_DEPTH_KEYWORDS);
        const nonProductHits = countKeywordHits(text, NON_PRODUCT_NEWS_KEYWORDS);
        const productBoost = Math.min(180, productHits * 42);
        const techBoost = Math.min(130, techHits * 24);
        const sourceBoost = OFFICIAL_TECH_SOURCES.has(item?.sourceFeed || "") ? 36 : 0;
        const nonProductPenalty = Math.min(96, nonProductHits * 24);
        return productBoost + techBoost + sourceBoost - nonProductPenalty;
      }

      function getLaunchSignalMetrics(item) {
        const titleText = normalizeCompareText(item?.title || "");
        const bodyText = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        if (!bodyText) {
          return {
            launchHits: 0,
            titleLaunchHits: 0,
            techHits: 0,
            nonProductHits: 0,
          };
        }
        const launchHits = countKeywordHits(bodyText, LAUNCH_PRIORITY_KEYWORDS);
        const titleLaunchHits = countKeywordHits(titleText, LAUNCH_PRIORITY_KEYWORDS);
        const techHits = countKeywordHits(bodyText, TECH_DEPTH_KEYWORDS);
        const nonProductHits = countKeywordHits(bodyText, NON_PRODUCT_NEWS_KEYWORDS);
        return { launchHits, titleLaunchHits, techHits, nonProductHits };
      }

      function getLaunchPriorityScore(item) {
        const { launchHits, titleLaunchHits, techHits, nonProductHits } = getLaunchSignalMetrics(item);
        const officialBoost = OFFICIAL_TECH_SOURCES.has(item?.sourceFeed || "") ? 28 : 0;
        const detailBoost = hasProductDetailCard(item, true) ? 34 : 0;
        const techNewsBoost = isProductTechNews(item) ? 26 : 0;

        const pubMs = toDateMs(item?.pubDate || "");
        const ageDays = pubMs > 0 ? Math.max(0, (Date.now() - pubMs) / (24 * 60 * 60 * 1000)) : 30;
        const recencyBoost = Math.max(0, 84 - ageDays * 12);

        const score =
          launchHits * 72 +
          titleLaunchHits * 96 +
          techHits * 28 +
          detailBoost +
          techNewsBoost +
          officialBoost +
          recencyBoost -
          Math.min(120, nonProductHits * 18);
        return Math.max(0, score);
      }

      function isLaunchUpdatePriorityItem(item, strict = true) {
        const { launchHits, titleLaunchHits, techHits } = getLaunchSignalMetrics(item);
        const hasLaunchSignal = titleLaunchHits > 0 || launchHits > 0;
        const techQualified = hasProductDetailCard(item, true) || isProductTechNews(item) || techHits >= 2;
        if (strict) return hasLaunchSignal && techQualified;
        return (hasLaunchSignal && techQualified) || (getLaunchPriorityScore(item) >= 240 && techQualified);
      }

      function isProductTechNews(item) {
        const text = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        if (!text) return false;
        const productHits = countKeywordHits(text, PRODUCT_NEWS_KEYWORDS);
        const techHits = countKeywordHits(text, TECH_DEPTH_KEYWORDS);
        const { launchHits, titleLaunchHits, nonProductHits } = getLaunchSignalMetrics(item);
        const hasLaunchSignal = launchHits > 0 || titleLaunchHits > 0;
        const fromOfficial = OFFICIAL_TECH_SOURCES.has(item?.sourceFeed || "");
        if (nonProductHits >= 3 && !hasLaunchSignal) return false;
        if (fromOfficial) {
          if (hasLaunchSignal && (productHits >= 1 || techHits >= 2)) return true;
          return (productHits >= 1 && techHits >= 1) || techHits >= 3;
        }
        if (hasLaunchSignal && (productHits >= 1 || techHits >= 2)) return true;
        return (productHits >= 1 && techHits >= 1) || techHits >= 3;
      }

      function getLowSignalPenalty(item) {
        const text = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        if (!text) return 0;

        const lowSignalHits = countKeywordHits(text, LOW_SIGNAL_CONTENT_KEYWORDS);
        let penalty = Math.min(180, lowSignalHits * 34);
        if (isSubjectiveStyleStory(item)) penalty += 240;

        const summary = getNormalizedSummaryForItem(item);
        if (isSummaryEmptyText(summary)) penalty += 64;
        if (isKeywordFallbackSummary(summary)) penalty += 52;
        if (isSummarySameAsTitle(summary, item?.title || "")) penalty += 38;

        if (isProductTechNews(item)) penalty = Math.max(0, penalty - 56);
        return penalty;
      }

      function isPromotionalSelfPost(item) {
        const title = stripHtml(decodeHtmlEntitiesText(item?.title || ""));
        const summary = stripHtml(decodeHtmlEntitiesText(item?.summaryText || ""));
        const cats = (item?.categories || []).map((c) => decodeHtmlEntitiesText(c)).join(" ");
        const link = String(item?.link || "");
        const merged = `${title} ${summary} ${cats}`.replace(/\s+/g, " ").trim();
        if (!merged) return false;

        if (PROMO_SELF_PATTERNS.some((re) => re.test(merged))) return true;

        const isTechCrunch = /(?:^|\/\/)(?:www\.)?techcrunch\.com/i.test(link);
        if (!isTechCrunch) return false;

        const tcPromoSignals = [/\bdisrupt\b/i, /\bsessions?\b/i, /\bevent\b/i, /\bconference\b/i, /\btickets?\b/i, /\bregister\b/i];
        let hits = 0;
        for (const re of tcPromoSignals) {

        return hits >= 2;

      function isSubjectiveStyleStory(item) {
        const title = decodeHtmlEntitiesText(item?.title || "");
        const summary = decodeHtmlEntitiesText(item?.summaryText || "");
        const cats = Array.isArray(item?.categories) ? item.categories.map((c) => decodeHtmlEntitiesText(c)).join(" ") : "";
        const merged = `${title} ${summary} ${cats}`.replace(/\s+/g, " ").trim();
        if (!merged) return false;
        const normalized = normalizeCompareText(merged);
        const keywordHits = countKeywordHits(normalized, SUBJECTIVE_STYLE_KEYWORDS);
        const softHits = countKeywordHits(normalized, SUBJECTIVE_SOFT_KEYWORDS);
        const productSignalHits = countKeywordHits(normalized, PRODUCT_NEWS_KEYWORDS) + countKeywordHits(normalized, TECH_DEPTH_KEYWORDS);
        const weakProductSignal = productSignalHits < 2;
        const hasCommentaryHeadline =
          /(함정|아무도\s*없|어떻게\s+협력해야|좋은\s*계획|trap|no one has|nobody has|how .* should|against ai|anti-ai)/i.test(title);
        const hasNarrativeFeatureHeadline =

            `${title} ${summary}`,

        const personTagHits = (Array.isArray(item?.categories) ? item.categories : []).reduce((acc, tagRaw) => {
          const tag = decodeHtmlEntitiesText(tagRaw || "").trim();
          if (!tag) return acc;

            return acc;
          }
          if (/^[A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,3}$/.test(tag)) return acc + 1;
          return acc;
        }, 0);
        const firstPerson =
          /\b(i|my|we|our|me|us)\b/i.test(summary) ||
          /(저는|제가|나는|내가|우리|우리는)\s+/.test(summary);
        if (keywordHits >= 1 || firstPerson) return true;
        if (weakProductSignal && softHits >= 2) return true;
        if (hasCommentaryHeadline) return true;
        if (weakProductSignal && hasNarrativeFeatureHeadline) return true;
        if (weakProductSignal && personTagHits >= 1 && softHits >= 1) return true;
        return false;
      }

      function toDateMs(pubDate) {
        const d = new Date(pubDate || "");

      function decodeHtmlEntitiesText(input) {
        const raw = String(input || "");
        if (!raw) return "";
        const ta = document.createElement("textarea");
        let out = raw;
        for (let i = 0; i < 2; i++) {
          ta.innerHTML = out;
          const next = ta.value || ta.textContent || "";
          if (next === out) break;
          out = next;
        }
        return out.replace(/\s+/g, " ").trim();
      }

      function normalizeCompareText(input) {
        return decodeHtmlEntitiesText(input)
          .toLowerCase()
          .replace(/https?:\/\/\S+/gi, " ")
          .replace(/[^0-9a-z\u00C0-\u024F\uAC00-\uD7A3]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function stableHashNumber(input) {
        const text = String(input || "");
        let hash = 2166136261 >>> 0;
        for (let i = 0; i < text.length; i++) {
          hash ^= text.charCodeAt(i);
          hash = Math.imul(hash, 16777619) >>> 0;
        }
        return hash >>> 0;
      }

      function seededShuffle(list, seedInput) {
        const out = Array.isArray(list) ? list.slice() : [];
        let seed = stableHashNumber(seedInput) || 1;
        const nextRand = () => {
          seed = (Math.imul(seed, 1664525) + 1013904223) >>> 0;
          return seed / 4294967296;
        };
        for (let i = out.length - 1; i > 0; i--) {
          const j = Math.floor(nextRand() * (i + 1));
          [out[i], out[j]] = [out[j], out[i]];
        }
        return out;
      }

      function pickUniqueFallbackCardBg(pool, usedKeys, avoidKeys, cursor) {

          const promptSeed = extractCardPromptKeywords(it, 4).join("|");
          const topicPool = seededShuffle(
            getTopicRealPhotoPool(topicKey),
            `${FALLBACK_SESSION_SEED}|${topicKey}|${it?.guid || ""}|${it?.link || ""}|${promptSeed}`,
          );
          let topicCursor = topicCursorMap.get(topicKey) || 0;
          const primaryPick = pickUniqueFallbackCardBg(topicPool, usedKeys, [sourceRaw], topicCursor);
          topicCursorMap.set(topicKey, primaryPick.nextCursor);
          topicCursor = topicCursorMap.get(topicKey) || 0;
          const secondaryPick = pickUniqueFallbackCardBg(
            topicPool,
            usedKeys,
            [sourceRaw, primaryPick.rawUrl],
            topicCursor,
          );
          topicCursorMap.set(topicKey, secondaryPick.nextCursor);
          const staticPick = pickUniqueFallbackCardBg(
            CARD_BG_FALLBACKS,
            usedKeys,
            [sourceRaw, primaryPick.rawUrl, secondaryPick.rawUrl],
            fallbackCursor,
          );
          fallbackCursor = staticPick.nextCursor;
          const generatedRaw = buildAiGeneratedCardBg(it, idx + 1);
          const localRaw = pickLocalAiFallback(it, idx + 1) || defaultRaw;
          const fallbackPrimaryRaw =
            primaryPick.rawUrl ||
            buildTopicMatchedPhotoFallback(it, idx * 3 + 1) ||
            staticPick.rawUrl ||
            generatedRaw ||
            localRaw;
          const fallbackSecondaryRaw =
            secondaryPick.rawUrl ||
            buildTopicMatchedPhotoFallback(it, idx * 3 + 2) ||
            staticPick.rawUrl ||
            generatedRaw ||
            localRaw;
          const fallbackTertiaryRaw =
            staticPick.rawUrl ||
            buildTopicMatchedPhotoFallback(it, idx * 3 + 3) ||
            generatedRaw ||
            localRaw;
          const fallbackQuaternaryRaw = generatedRaw || localRaw;
          const fallbackQuinaryRaw = localRaw;
          [fallbackPrimaryRaw, fallbackSecondaryRaw, fallbackTertiaryRaw, fallbackQuaternaryRaw, fallbackQuinaryRaw].forEach((raw) => {
            const k = normalizeImageCompareKey(raw);
            if (k) usedKeys.add(k);
          });

          return {
            hasSourceImage: false,
            primaryCardBg: "",
            fallbackCardBg: buildCardBgImageUrl(fallbackPrimaryRaw),
            fallbackCardBgSecondary: buildCardBgImageUrl(fallbackSecondaryRaw),
            fallbackCardBgTertiary: buildCardBgImageUrl(fallbackTertiaryRaw),
            fallbackCardBgQuaternary: buildCardBgImageUrl(fallbackQuaternaryRaw),
            fallbackCardBgQuinary: buildCardBgImageUrl(fallbackQuinaryRaw),
          };
        });

      function tokenSetFromNormalizedText(text) {
        return new Set(
          String(text || "")
            .split(/\s+/)
            .filter((tok) => tok && tok.length >= 3 && !ISSUE_STOPWORDS.has(tok)),
        );
      }

      function contentTokenSet(item) {
        const merged = normalizeCompareText(`${item?.title || ""} ${item?.summaryText || ""} ${(item?.categories || []).join(" ")}`);
        return new Set(
          String(merged || "")
            .split(/\s+/)
            .filter((tok) => tok && tok.length >= 4 && !ISSUE_STOPWORDS.has(tok)),
        );
      }

      function titleTokenSet(item) {
        const t = normalizeCompareText(item?.title || "");
        return new Set(
          String(t || "")
            .split(/\s+/)
            .filter((tok) => tok && tok.length >= 3 && !ISSUE_STOPWORDS.has(tok)),
        );
      }

      function jaccardSimilarity(setA, setB) {
        if (!setA.size || !setB.size) return 0;
        let inter = 0;
        setA.forEach((v) => {
          if (setB.has(v)) inter++;
        });
        const union = setA.size + setB.size - inter;
        return union ? inter / union : 0;
      }

      function isNearDuplicateByTitle(a, b) {
        const ta = normalizeCompareText(a?.title || "");
        const tb = normalizeCompareText(b?.title || "");
        if (!ta || !tb) return false;
        if (ta === tb) return true;
        if (ta.length >= 24 && tb.length >= 24 && (ta.includes(tb) || tb.includes(ta))) return true;

        const sa = tokenSetFromNormalizedText(ta);
        const sb = tokenSetFromNormalizedText(tb);
        let inter = 0;
        sa.forEach((v) => {
          if (sb.has(v)) inter++;
        });
        const j = jaccardSimilarity(sa, sb);
        return inter >= 3 && j >= 0.54;
      }

      function isNearDuplicateByContent(a, b) {
        const sa = contentTokenSet(a);
        const sb = contentTokenSet(b);
        if (!sa.size || !sb.size) return false;
        let inter = 0;
        sa.forEach((v) => {
          if (sb.has(v)) inter++;
        });
        const j = jaccardSimilarity(sa, sb);
        if (inter >= 7) return true;
        return inter >= 4 && j >= 0.4;
      }

      function canonicalLinkKey(link) {
        if (!link) return "";
        try {
          const u = new URL(String(link));
          u.hash = "";
          const drop = [];
          u.searchParams.forEach((_v, k) => {
            if (/^(utm_|fbclid|gclid|mc_|ref$)/i.test(k)) drop.push(k);
          });
          drop.forEach((k) => u.searchParams.delete(k));
          return `${u.hostname}${u.pathname}`.toLowerCase().replace(/\/+$/g, "");
        } catch (e) {
          return String(link || "").toLowerCase().trim();
        }
      }

      function isSummarySameAsTitle(summary, title) {
        const s = normalizeCompareText(summary);
        const t0 = normalizeCompareText(title);
        if (!s || !t0) return false;
        if (s === t0) return true;
        if (s.length >= 28 && (t0.includes(s) || s.includes(t0))) return true;
        return false;
      }

      function isKeywordFallbackSummary(summary) {
        const s = decodeHtmlEntitiesText(summary);
        return s.startsWith("핵심 키워드:") || s.startsWith("Key topics:");
      }

      function isSummaryEmptyText(summary) {
        const s = decodeHtmlEntitiesText(summary || "").trim();
        if (!s) return true;
        return s === I18N.ko.summary_empty || s === I18N.en.summary_empty;
      }

      function getNormalizedSummaryForItem(item, scoringLang = "en") {
        const titleText = decodeHtmlEntitiesText(item?.title || "");
        const prevLang = currentLang;
        if (scoringLang && prevLang !== scoringLang) currentLang = scoringLang;
        try {
          return buildSummaryText(item?.summaryText, titleText, item?.categories || []);
        } finally {
          if (currentLang !== prevLang) currentLang = prevLang;
        }
      }

      function isGoodSummaryItem(item) {
        const summary = getNormalizedSummaryForItem(item);
        if (isSummaryEmptyText(summary)) return false;
        if (isKeywordFallbackSummary(summary)) return false;
        return normalizeCompareText(summary).length >= 48;
      }

      function buildSummaryText(raw, titleText, categories) {
        const txt = decodeHtmlEntitiesText(raw);
        if (!txt) return t("summary_empty");

        const stripTitlePrefix = (summary, title) => {
          let out = String(summary || "").trim();
          const cleanTitle = decodeHtmlEntitiesText(title || "")
            .replace(/\s+/g, " ")
            .replace(/[.?!]+$/g, "")
            .trim();
          if (!out || !cleanTitle || cleanTitle.length < 10) return out;

          const escapeRegExp = (value) => String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const pref = new RegExp(`^${escapeRegExp(cleanTitle)}\\s*[:：\\-–—,]\\s*`, "i");
          if (pref.test(out)) {
            const stripped = out.replace(pref, "").trim();
            if (stripped.length >= 34) out = stripped;
          }

          const normTitle = normalizeCompareText(cleanTitle);
          const sentences = out.split(/(?<=[.!?。！？])\s+/).filter(Boolean);
          if (sentences.length > 1) {
            const first = sentences[0];
            const normFirst = normalizeCompareText(first);
            const overlap =
              normFirst &&
              normTitle &&
              (normFirst === normTitle ||
                normFirst.startsWith(normTitle.slice(0, Math.min(34, normTitle.length))) ||
                normTitle.startsWith(normFirst.slice(0, Math.min(26, normFirst.length))));
            if (overlap) {
              const rest = sentences.slice(1).join(" ").trim();
              if (rest.length >= 34) out = rest;
            }
          }

          return out.trim();
        };

        const hasProductSignal = (text) => {
          const merged = normalizeCompareText(String(text || ""));
          if (!merged) return false;
          const productHits = countKeywordHits(merged, PRODUCT_NEWS_KEYWORDS);
          const techHits = countKeywordHits(merged, TECH_DEPTH_KEYWORDS);
          if (productHits >= 1 || techHits >= 1) return true;
          return /(?:출시|공개|발표|업데이트|기능|모델|버전|api|sdk|앱|서비스|칩|gpu|도입|추가|개선|강화|연동|통합|배포)/i.test(
            String(text || ""),
          );
        };

        const captionLikePatterns = [
          /\b(?:photo|pictured|image|images|screenshot|render(?:ing)?|illustration|visual)\b/i,
          /\b(?:on the left|on the right|left side|right side|in the background|foreground)\b/i,
          /\b(?:wearing|poses?|standing|sitting|smiling|looks? at|holding)\b/i,
          /\b(?:is shown|shown on|displayed on|can be seen|features? a person)\b/i,
          /(?:왼쪽|오른쪽|배경|전경|사진에는|이미지에는|포즈|입은|착용|화면에는|표시되어 있습니다|보입니다|보여줍니다)/,
        ];

        const sanitizeSummarySentences = (inputText) => {
          const source = String(inputText || "").trim();
          if (!source) return [];
          const parts = source.split(/(?<=[.!?。！？])\s+/).map((s) => s.trim()).filter(Boolean);
          const sanitized = [];
          for (const sentence of parts) {
            const plain = decodeHtmlEntitiesText(sentence).replace(/\s+/g, " ").trim();
            if (!plain || plain.length < 18) continue;
            const isCaptionLike = captionLikePatterns.some((re) => re.test(plain));
            const sentenceHasProductSignal = hasProductSignal(plain);
            if (isCaptionLike && !sentenceHasProductSignal) continue;
            if (!sentenceHasProductSignal && plain.length < 52) continue;
            sanitized.push(plain);
          }
          return sanitized;
        };

        // Remove RSS trailing ellipsis and keep a compact, image-friendly summary.
        const cleaned = txt
          .replace(/https?:\/\/\S+/gi, " ")
          .replace(/\b\S+\.(png|jpe?g|gif|webp|svg)\b/gi, " ")
          .replace(/\b\d{2,4}x\d{2,4}\b/g, " ")
          .replace(/\[\s*(?:\.\.\.|…)\s*\]/g, " ")
          .replace(/\(\s*(?:\.\.\.|…)\s*\)/g, " ")
          .replace(/\s*(\.\.\.|…)+\s*$/g, "")
          .replace(/\s+/g, " ")
          .trim();
        if (!cleaned || !/[A-Za-z0-9\uAC00-\uD7A3]/.test(cleaned)) return t("summary_empty");
        const sanitizedSentences = sanitizeSummarySentences(cleaned);
        const filteredCleaned = sanitizedSentences.join(" ").trim();
        if (!filteredCleaned || !/[A-Za-z0-9\uAC00-\uD7A3]/.test(filteredCleaned)) return t("summary_empty");

        const titleSignalsText = normalizeCompareText(`${titleText || ""} ${(categories || []).join(" ")}`);
        const titleSignalScore = countKeywordHits(titleSignalsText, PRODUCT_NEWS_KEYWORDS) + countKeywordHits(titleSignalsText, TECH_DEPTH_KEYWORDS);

        const mergedForDetail = normalizeCompareText(`${titleText || ""} ${filteredCleaned} ${(categories || []).join(" ")}`);
        const productHits = countKeywordHits(mergedForDetail, PRODUCT_NEWS_KEYWORDS);
        const techHits = countKeywordHits(mergedForDetail, TECH_DEPTH_KEYWORDS);
        const isProductDetail = productHits >= 1 || techHits >= 2 || titleSignalScore >= 1;
        if (!isProductDetail) return t("summary_empty");
        const MAX_SUMMARY_CHARS = isProductDetail
          ? currentLang === "ko"
            ? 780
            : 920
          : currentLang === "ko"
            ? 520
            : 620;
        let result = filteredCleaned;
        if (filteredCleaned.length > MAX_SUMMARY_CHARS) {
          // Prefer full sentences that fit within the target length.
          const sentences = sanitizedSentences.length ? sanitizedSentences : filteredCleaned.split(/(?<=[.!?。！？])\s+/).filter(Boolean);
          let compact = "";
          for (const s of sentences) {
            const next = compact ? `${compact} ${s}` : s;
            if (next.length > MAX_SUMMARY_CHARS) break;
            compact = next;
          }
          if (compact) result = compact.replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
          else {
            const sliced = filteredCleaned.slice(0, MAX_SUMMARY_CHARS);
            const cutAt = sliced.lastIndexOf(" ");
            const safe = (cutAt > 120 ? sliced.slice(0, cutAt) : sliced).trim();
            result = safe.replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
          }
        }

        result = stripTitlePrefix(result, titleText);
        if (currentLang === "ko") {
          result = result.replace(/\s+/g, " ").trim();
          if (result && !/[.!?]$/.test(result)) result += ".";
        } else {
          result = result.replace(/\s+/g, " ").trim();
          if (result && !/[.!?]$/.test(result)) result += ".";
        }

        if (isSummarySameAsTitle(result, titleText)) {
          const sentences = sanitizedSentences.length ? sanitizedSentences : filteredCleaned.split(/(?<=[.!?。！？])\s+/).filter(Boolean);
          if (sentences.length > 1) {
            const alt = sentences.slice(1).join(" ").trim();
            if (alt && normalizeCompareText(alt).length >= 24) {
              return alt;
            }
          }
          return t("summary_empty");
        }
        return result;
      }

      function buildEmergencySummaryText(raw, titleText = "") {
        const txt = decodeHtmlEntitiesText(raw || "")
          .replace(/https?:\/\/\S+/gi, " ")
          .replace(/\b\S+\.(png|jpe?g|gif|webp|svg)\b/gi, " ")
          .replace(/\b\d{2,4}x\d{2,4}\b/g, " ")
          .replace(/\[\s*(?:\.\.\.|…)\s*\]/g, " ")
          .replace(/\(\s*(?:\.\.\.|…)\s*\)/g, " ")
          .replace(/\s*(\.\.\.|…)+\s*$/g, "")
          .replace(/\s+/g, " ")
          .trim();
        if (!txt) return "";

        const titleNorm = normalizeCompareText(titleText || "");
        const captionLikePatterns = [
          /(?:왼쪽|오른쪽|배경|전경|사진에는|이미지에는|포즈|입은|착용|화면에는|표시되어 있습니다|보입니다|보여줍니다)/,
          /\b(?:photo|pictured|image|images|screenshot|render(?:ing)?|illustration|on the left|on the right|background)\b/i,

        const sentences = txt.split(/(?<=[.!?。！？])\s+/).filter(Boolean);
        const picked = [];
        for (const sentence of sentences) {

          if (!s || s.length < 28) continue;
          if (captionLikePatterns.some((re) => re.test(s))) continue;
          if (titleNorm && normalizeCompareText(s) === titleNorm) continue;
          picked.push(s);
          if (picked.length >= 5) break;
        }

        const outBase = picked.length ? picked.join(" ") : txt;
        const clipped = outBase.length > 900 ? outBase.slice(0, 900).trim() : outBase;
        const normalized = clipped.replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
        if (!normalized) return "";
        return /[.!?]$/.test(normalized) ? normalized : `${normalized}.`;

      function buildDetailSupplementText(raw, titleText = "") {
        const txt = decodeHtmlEntitiesText(raw || "")
          .replace(/https?:\/\/\S+/gi, " ")
          .replace(/\b\S+\.(png|jpe?g|gif|webp|svg)\b/gi, " ")
          .replace(/\b\d{2,4}x\d{2,4}\b/g, " ")
          .replace(/\[\s*(?:\.\.\.|…)\s*\]/g, " ")
          .replace(/\(\s*(?:\.\.\.|…)\s*\)/g, " ")
          .replace(/\s*(\.\.\.|…)+\s*$/g, "")
          .replace(/\s+/g, " ")
          .trim();
        if (!txt) return "";

        const titleNorm = normalizeCompareText(titleText || "");
        const titleSentence = decodeHtmlEntitiesText(titleText || "")
          .replace(/\s+/g, " ")
          .replace(/[.?!]+$/g, "")
          .trim();
        const captionLikePatterns = [
          /(?:왼쪽|오른쪽|배경|전경|사진에는|이미지에는|포즈|입은|착용|화면에는|표시되어 있습니다|보입니다|보여줍니다)/,
          /\b(?:photo|pictured|image|images|screenshot|render(?:ing)?|illustration|on the left|on the right|background)\b/i,
        ];

        const hasProductSignal = (text) => {
          const s = String(text || "");
          return /(?:출시|공개|발표|업데이트|기능|모델|버전|api|sdk|앱|서비스|칩|gpu|도입|추가|개선|강화|연동|통합|배포|성능|launch|release|unveil|introduc|announce|rollout|beta|preview|feature|model|api|sdk|app)/i.test(
            s,
          );
        };

        const sentences = txt.split(/(?<=[.!?。！？])\s+/).filter(Boolean);
        const picked = [];
        const seen = new Set();
        const candidates = [titleSentence, ...sentences].filter(Boolean);
        for (const sentence of candidates) {
          const s = decodeHtmlEntitiesText(sentence || "").replace(/\s+/g, " ").trim();
          if (!s || s.length < 20) continue;
          if (captionLikePatterns.some((re) => re.test(s)) && !hasProductSignal(s)) continue;
          const norm = normalizeCompareText(s);
          if (!norm) continue;
          if (titleNorm && (norm === titleNorm || norm.startsWith(titleNorm.slice(0, Math.min(36, titleNorm.length))))) continue;
          if (seen.has(norm)) continue;
          seen.add(norm);
          picked.push(/[.!?]$/.test(s) ? s : `${s}.`);
          if (picked.length >= 6) break;
        }

        if (!picked.length) return "";
        const out = picked.join(" ").replace(/\s+/g, " ").trim();
        const clipped = out.length > 900 ? out.slice(0, 900).trim() : out;
        if (!clipped) return "";
        return /[.!?]$/.test(clipped) ? clipped : `${clipped}.`;
      }

      function buildExpandedEnglishSummary(baseSummary, rawSummary, titleText = "") {
        const MIN_CHARS = 260;
        const MAX_CHARS = 480;

        const cleanText = (value) =>
          decodeHtmlEntitiesText(value || "")
            .replace(/https?:\/\/\S+/gi, " ")
            .replace(/\b\S+\.(png|jpe?g|gif|webp|svg)\b/gi, " ")
            .replace(/\b\d{2,4}x\d{2,4}\b/g, " ")
            .replace(/\[\s*(?:\.\.\.|…)\s*\]/g, " ")
            .replace(/\(\s*(?:\.\.\.|…)\s*\)/g, " ")
            .replace(/\s*(\.\.\.|…)+\s*$/g, "")
            .replace(/\s+/g, " ")
            .trim();

        const toSentences = (value) =>
          cleanText(value)
            .split(/(?<=[.!?。！？])\s+/)
            .map((s) => s.replace(/\s+/g, " ").trim())
            .filter(Boolean);

        const titleNorm = normalizeCompareText(titleText || "");
        const candidates = [...toSentences(baseSummary), ...toSentences(rawSummary)];
        const seen = new Set();
        const uniq = [];
        for (const s of candidates) {
          const norm = normalizeCompareText(s);
          if (!norm || norm.length < 24) continue;
          if (titleNorm && (norm === titleNorm || norm.startsWith(titleNorm.slice(0, Math.min(34, titleNorm.length))))) continue;
          if (seen.has(norm)) continue;
          seen.add(norm);
          uniq.push(/[.!?]$/.test(s) ? s : `${s}.`);
        }
        if (!uniq.length) return cleanText(baseSummary || rawSummary || "");

        let out = "";
        for (const s of uniq) {
          const next = out ? `${out} ${s}` : s;
          const nextLen = normalizeCompareText(next).length;
          if (nextLen > MAX_CHARS && normalizeCompareText(out).length >= MIN_CHARS) break;
          if (nextLen > MAX_CHARS && !out) {
            out = s;
            break;
          }
          out = next;
        }

        if (normalizeCompareText(out).length < MIN_CHARS) {
          for (const s of uniq) {
            if (out.includes(s)) continue;
            const next = `${out} ${s}`.replace(/\s+/g, " ").trim();
            out = next;
            if (normalizeCompareText(out).length >= MIN_CHARS) break;
            if (normalizeCompareText(out).length >= MAX_CHARS + 40) break;
          }
        }

        if (!out) out = uniq[0];
        if (normalizeCompareText(out).length > MAX_CHARS + 40) {
          const sentenceParts = out.split(/(?<=[.!?])\s+/).filter(Boolean);
          let compact = "";
          for (const part of sentenceParts) {
            const next = compact ? `${compact} ${part}` : part;
            if (normalizeCompareText(next).length > MAX_CHARS + 30) break;
            compact = next;
          }
          if (compact) {
            out = compact.replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
          } else {
            const sliced = out.slice(0, MAX_CHARS + 40);
            const cut = sliced.lastIndexOf(" ");
            out = (cut > 120 ? sliced.slice(0, cut) : sliced).trim();
            out = out.replace(/\s*(\.\.\.|…)+\s*$/g, "").trim();
          }
          if (out && !/[.!?]$/.test(out)) out += ".";
        }
        return out.replace(/\s+/g, " ").trim();
      }

      function enrichProductLaunchSummaryEn(baseSummary, rawSummary, rawTitle = "", categories = []) {
        const cleanText = (value) =>

            .replace(/\b\S+\.(png|jpe?g|gif|webp|svg)\b/gi, " ")
            .replace(/\b\d{2,4}x\d{2,4}\b/g, " ")

          cleanText(value)
            .split(/(?<=[.!?])\s+|\n+/)

            .filter(Boolean);

        const sentenceFromTitle = (value) => {
          const t = cleanText(value).replace(/[.!?]+$/g, "").trim();
          if (!t || t.length < 16) return "";

        };

        const normalizeLaunchVerb = (verb) => {
          const v = String(verb || "").toLowerCase().trim();

            added: "adds",

            supported: "supports",

          };

        };

        const normalizeSentence = (value) => normalizeCompareText(cleanText(value || "").replace(/[.!?]+$/g, ""));

        const pushUniqueSentence = (bucket, sentence, seenSet) => {
          const plain = cleanText(sentence || "").replace(/[.!?]+$/g, "").trim();
          if (!plain || plain.length < 16) return false;

        const buildLaunchContextSentences = (title, summary, existingText = "") => {
